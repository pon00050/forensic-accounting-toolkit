name: "Tier 1 — Sibling Repo CI Monitor"

# Polls GitHub API check-runs for the master HEAD of every sibling repo.
# No changes required to sibling repos — ECOSYSTEM_PAT with repo scope is enough.
# Creates a hub issue if any sibling's master branch is currently red.

on:
  schedule:
    - cron: "0 */3 * * *"   # Every 3 hours — catches regressions within one watch window
  workflow_dispatch:
  repository_dispatch:
    types: [check-sibling-ci]   # Reserved for future Tier 4 post-merge dispatch

permissions:
  issues: write
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Poll sibling repo CI (check-runs on master HEAD)
        env:
          # ECOSYSTEM_PAT needs repo scope on all 13 sibling repos.
          # Falls back to github.token, which can only read this hub repo.
          # If PAT is missing, sibling checks will fail silently (exit 0 per-repo).
          GH_TOKEN: ${{ secrets.ECOSYSTEM_PAT != '' && secrets.ECOSYSTEM_PAT || github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python3 scripts/ci/check_sibling_ci.py

      - name: Create or update hub issue for failures
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path

          p = Path("_scratchpad/sibling-ci-failures.json")
          if not p.exists():
              print("No failures file — poll step may have errored")
              sys.exit(0)

          data = json.loads(p.read_text())
          failures = data.get("failures", [])
          checked_at = data.get("checked_at", "")

          if not failures:
              # Close any open monitor issue if all repos are now green
              existing = subprocess.run([
                  "gh", "issue", "list", "--label", "agent-task",
                  "--state", "open", "--json", "number,title",
                  "--jq", '.[] | select(.title | startswith("[P0] CI failing on master:")) | .number',
              ], capture_output=True, text=True)
              for num in [n.strip() for n in existing.stdout.strip().splitlines() if n.strip()]:
                  subprocess.run([
                      "gh", "issue", "close", num,
                      "--comment", f"All sibling repos green as of {checked_at[:19]}Z. Auto-closing.",
                  ], check=False)
                  print(f"Closed stale monitor issue #{num}")
              print("All sibling repos: master CI green")
              sys.exit(0)

          # Deduplicate: worst failure per repo (multiple failing workflows → one entry)
          by_repo = {}
          for f in failures:
              r = f["repo"]
              if r not in by_repo:
                  by_repo[r] = []
              by_repo[r].append(f)

          repo_lines = []
          for r, fs in by_repo.items():
              workflow_links = ", ".join(f"[{f['check_name']}]({f['html_url']})" for f in fs[:3])
              repo_lines.append(f"- **{r}**: {workflow_links}")
          body_failures = "\n".join(repo_lines)

          title = f"[P0] CI failing on master: {', '.join(by_repo.keys())}"
          body = f"""## Sibling Repo CI Failures — master branch

Master HEAD check-runs are failing on:

{body_failures}

**Checked at:** {checked_at}

### What to check
1. Click a workflow link to see the failure detail in that sibling repo
2. If it looks auto-fixable (test failure, stub, doc drift): dispatch Tier 4 via `workflow_dispatch` on `tier4-autofix.yml` with a fix brief
3. If it's a transient flake: re-run the failing job directly in the sibling repo
4. If structural: investigate manually

> Auto-generated by `tier1-sibling-ci-monitor.yml`. Closes automatically when master turns green.
"""

          # Dedup: update existing open issue rather than spamming
          existing = subprocess.run([
              "gh", "issue", "list", "--label", "agent-task",
              "--state", "open", "--json", "number,title",
              "--jq", '.[] | select(.title | startswith("[P0] CI failing on master:")) | .number',
          ], capture_output=True, text=True)
          existing_nums = [n.strip() for n in existing.stdout.strip().splitlines() if n.strip()]

          if existing_nums:
              subprocess.run([
                  "gh", "issue", "edit", existing_nums[0],
                  "--title", title,
                  "--body", body,
              ], check=False)
              print(f"Updated existing monitor issue #{existing_nums[0]}")
          else:
              result = subprocess.run([
                  "gh", "issue", "create",
                  "--title", title,
                  "--body", body,
                  "--label", "agent-task",
              ], capture_output=True, text=True)
              print(f"Created monitor issue: {result.stdout.strip()}")
          PYEOF

      - name: Upload scratchpad
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-sibling-ci-monitor
          path: _scratchpad/sibling-ci-failures.json
          retention-days: 7
          if-no-files-found: ignore
