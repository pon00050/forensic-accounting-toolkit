name: "Telegram Bot — Command Router"

# Two modes:
#
# 1. POLL (cron, fallback): runs every 30 min as a safety net in case the
#    Cloudflare Worker webhook is unreachable.
#
# 2. PROCESS-COMMAND (workflow_dispatch from CF Worker): the primary path.
#    The CF Worker receives Telegram webhooks instantly, sends an ACK, then
#    dispatches this workflow with command/args/chat_id inputs. This job
#    executes the command and sends the result back via Telegram.
#
# Normal latency with webhook active: ACK <1 sec, result 30–60 sec.

on:
  schedule:
    - cron: "*/30 * * * *"   # fallback poll — reduced from */5 since CF Worker handles real-time
  workflow_dispatch:
    inputs:
      command:
        description: 'Telegram command to process (e.g. /work)'
        required: false
        default: ''
      args:
        description: 'Command arguments (e.g. kr-beneish/5 for /approve)'
        required: false
        default: ''
      chat_id:
        description: 'Telegram chat_id to reply to'
        required: false
        default: ''

permissions:
  actions: write   # required for gh variable set/get and workflow dispatch
  contents: read
  issues: write
  pull-requests: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 4   # must complete before next cron fires
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Get last processed update_id
        id: last_id
        env:
          # ECOSYSTEM_PAT has repo scope — required for variable read/write
          GH_TOKEN: ${{ secrets.ECOSYSTEM_PAT }}
        run: |
          LAST=$(gh variable get TELEGRAM_LAST_UPDATE_ID 2>/dev/null || echo "0")
          if ! echo "$LAST" | grep -qE '^[0-9]+$'; then LAST="0"; fi
          echo "last_update_id=$LAST" >> $GITHUB_OUTPUT
          echo "Last update_id: $LAST"

      - name: Poll Telegram and route commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ECOSYSTEM_PAT needed for gh variable set (repo scope)
          GH_TOKEN: ${{ secrets.ECOSYSTEM_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_UPDATE_ID: ${{ steps.last_id.outputs.last_update_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping"
            exit 0
          fi
          python3 - <<'PYEOF'
          import json
          import os
          import subprocess
          import sys
          import urllib.parse
          import urllib.request
          from pathlib import Path

          TOKEN        = os.environ["TELEGRAM_BOT_TOKEN"]
          ALLOWED_CHAT = str(os.environ["TELEGRAM_CHAT_ID"]).strip()
          REPO         = os.environ["GITHUB_REPOSITORY"]
          LAST_ID      = int(os.environ.get("LAST_UPDATE_ID", "0"))

          # ── Telegram helpers ─────────────────────────────────────────────────

          def tg_get(method, params=None):
              url = f"https://api.telegram.org/bot{TOKEN}/{method}"
              if params:
                  url += "?" + urllib.parse.urlencode(params)
              try:
                  with urllib.request.urlopen(url, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"[tg] GET {method} failed: {e}", file=sys.stderr)
                  return None

          def tg_send(chat_id, text):
              data = urllib.parse.urlencode({
                  "chat_id": chat_id, "text": text,
                  "parse_mode": "Markdown",
                  "disable_web_page_preview": "true",
              }).encode()
              try:
                  with urllib.request.urlopen(
                      urllib.request.Request(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage", data=data
                      ), timeout=10
                  ) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"[tg] sendMessage failed: {e}", file=sys.stderr)
                  return None

          # ── GitHub helpers ───────────────────────────────────────────────────

          def gh_workflow_run(workflow_file):
              r = subprocess.run(
                  ["gh", "workflow", "run", workflow_file, "--repo", REPO],
                  capture_output=True, text=True,
              )
              return r.returncode == 0, r.stderr.strip()

          def gh_set_variable(name, value):
              subprocess.run(
                  ["gh", "variable", "set", name, "--body", str(value), "--repo", REPO],
                  capture_output=True,
              )

          # ── /status — reads latest orchestrator artifact ─────────────────────

          def get_status_summary():
              try:
                  r = subprocess.run([
                      "gh", "api",
                      f"repos/{REPO}/actions/artifacts?name=scratchpad-orchestrator&per_page=1",
                      "--jq", ".artifacts[0].id // empty",
                  ], capture_output=True, text=True)
                  artifact_id = r.stdout.strip()
                  if not artifact_id:
                      return "No orchestrator run yet. Send /orchestrate to generate a report."

                  subprocess.run([
                      "gh", "api",
                      f"repos/{REPO}/actions/artifacts/{artifact_id}/zip",
                      "--header", "Accept: application/vnd.github.v3+json",
                  ], capture_output=True,
                     stdout=open("/tmp/orch_artifact.zip", "wb"))

                  subprocess.run(
                      ["unzip", "-o", "/tmp/orch_artifact.zip", "-d", "/tmp/orch/"],
                      capture_output=True,
                  )

                  # Try health_summary.json first (written by orchestrator.yml)
                  summary_path = Path("/tmp/orch/health_summary.json")
                  if summary_path.exists():
                      s = json.loads(summary_path.read_text())
                      health_raw = str(s.get("health", "0")).split("/")[0].strip()
                      score = float(health_raw) if health_raw.replace(".", "").isdigit() else 0
                      emoji = "✅" if score >= 8 else "⚠️" if score >= 5 else "🚨"
                      lines = [
                          f"{emoji} *Health: {health_raw}/10*",
                          f"P0/P1: {s.get('p0p1_count','?')} | Needs human: {s.get('needs_human_count','?')}",
                          f"Date: {s.get('date','?')}",
                      ]
                      if s.get("issue_url"):
                          lines.append(f"[Full report]({s['issue_url']})")
                      return "\n".join(lines)

                  # Fallback: orchestrator.json
                  orch_path = Path("/tmp/orch/orchestrator.json")
                  if orch_path.exists():
                      d = json.loads(orch_path.read_text())
                      health = d.get("ecosystem_health_score", "?")
                      p0p1 = len([b for b in d.get("action_briefs", []) if b.get("priority") in ("P0","P1")])
                      return f"Health: {health}/10\nP0/P1 items: {p0p1}\n_(run /orchestrate to refresh)_"

                  return "Status artifact found but unreadable. Run /orchestrate to refresh."
              except Exception as e:
                  return f"Status fetch error: {e}"

          # ── Work dispatch ────────────────────────────────────────────────────

          def dispatch_next_work_item(chat_id):
              """Find top P0/P1 actionable brief from latest orchestrator run and dispatch tier4."""
              try:
                  r = subprocess.run([
                      "gh", "api",
                      f"repos/{REPO}/actions/artifacts?name=scratchpad-orchestrator&per_page=1",
                      "--jq", ".artifacts[0].id // empty",
                  ], capture_output=True, text=True)
                  artifact_id = r.stdout.strip()
                  if not artifact_id:
                      return False

                  subprocess.run([
                      "gh", "api",
                      f"repos/{REPO}/actions/artifacts/{artifact_id}/zip",
                      "--header", "Accept: application/vnd.github.v3+json",
                  ], capture_output=True,
                     stdout=open("/tmp/work_artifact.zip", "wb"))
                  subprocess.run(
                      ["unzip", "-o", "/tmp/work_artifact.zip", "-d", "/tmp/work/"],
                      capture_output=True,
                  )

                  orch_path = Path("/tmp/work/orchestrator.json")
                  if not orch_path.exists():
                      return False

                  data = json.loads(orch_path.read_text())
                  briefs = data.get("action_briefs", [])
                  dispatchable = {"CONVENTION_DRIFT", "STUB", "DOC_DRIFT", "COUNT_DRIFT", "TEST_FAIL"}
                  for brief in briefs:
                      if (not brief.get("ai_actionable") or
                              brief.get("priority") not in ("P0", "P1") or
                              brief.get("category") not in dispatchable):
                          continue
                      repo_name = brief.get("repo", "")
                      if not repo_name:
                          continue
                      # Skip if open autofix PR already exists
                      open_prs = subprocess.run([
                          "gh", "pr", "list", "--repo", f"pon00050/{repo_name}",
                          "--state", "open", "--json", "headRefName",
                          "--jq", '[.[] | select(.headRefName | startswith("autofix/"))] | length',
                      ], capture_output=True, text=True).stdout.strip()
                      if open_prs and open_prs != "0":
                          continue
                      payload = json.dumps({
                          "event_type": "agent-fix",
                          "client_payload": {
                              "priority": brief.get("priority"),
                              "category": brief.get("category"),
                              "repo": repo_name,
                              "description": brief.get("change", ""),
                              "file": brief.get("file"),
                              "line": brief.get("line"),
                              "ai_actionable": True,
                              "brief_id": brief.get("id", ""),
                          }
                      })
                      r2 = subprocess.run(
                          ["gh", "api", f"repos/{REPO}/dispatches",
                           "--method", "POST", "--input", "-"],
                          input=payload, text=True, capture_output=True,
                      )
                      if r2.returncode == 0:
                          tg_send(chat_id,
                              f"🔧 Fixing `{repo_name}` [{brief.get('category')}]\n"
                              f"{brief.get('change','')[:100]}\n_Results in ~5 min_")
                          return True
                      else:
                          tg_send(chat_id, f"Dispatch failed: {r2.stderr.strip()[:200]}")
                          return False

                  tg_send(chat_id,
                      "No actionable P0/P1 items in last orchestrator run.\n"
                      "Run /orchestrate to synthesize fresh work.")
                  return False
              except Exception:
                  return False

          # ── PR approve / reject ──────────────────────────────────────────────

          def handle_pr(cmd, args, chat_id):
              """Handle /approve or /reject with a PR reference (repo/number or full URL)."""
              if not args:
                  tg_send(chat_id,
                      f"Usage: `{cmd} repo/pr-number`\nExample: `{cmd} kr-beneish/5`")
                  return
              ref = args.strip()
              if ref.startswith("https://github.com/"):
                  parts = ref.replace("https://github.com/", "").split("/")
                  if len(parts) >= 4 and parts[2] == "pull":
                      repo_name, pr_num = parts[1], parts[3]
                  else:
                      tg_send(chat_id, "Could not parse URL. Use `repo/pr-number` format.")
                      return
              elif "/" in ref:
                  repo_name, pr_num = ref.split("/", 1)
              else:
                  tg_send(chat_id, f"Usage: `{cmd} repo/pr-number`")
                  return

              if cmd == "/approve":
                  r = subprocess.run([
                      "gh", "pr", "merge", pr_num,
                      "--squash", "--delete-branch",
                      "--repo", f"pon00050/{repo_name}",
                  ], capture_output=True, text=True)
                  if r.returncode == 0:
                      tg_send(chat_id, f"✅ `{repo_name}` PR #{pr_num} merged.")
                  else:
                      tg_send(chat_id, f"Merge failed: {r.stderr.strip()[:200]}")
              else:
                  r = subprocess.run([
                      "gh", "pr", "close", pr_num,
                      "--comment", "Rejected via Telegram.",
                      "--repo", f"pon00050/{repo_name}",
                  ], capture_output=True, text=True)
                  if r.returncode == 0:
                      tg_send(chat_id, f"✅ `{repo_name}` PR #{pr_num} closed.")
                  else:
                      tg_send(chat_id, f"Close failed: {r.stderr.strip()[:200]}")

          # ── Error summary ────────────────────────────────────────────────────

          def get_recent_errors():
              """Return a short summary of the last 3 failed workflow runs."""
              try:
                  r = subprocess.run([
                      "gh", "run", "list",
                      "--repo", REPO,
                      "--json", "name,conclusion,url,createdAt",
                      "--limit", "20",
                  ], capture_output=True, text=True)
                  if r.returncode != 0:
                      return "Could not fetch workflow runs."
                  runs = json.loads(r.stdout)
                  failed = [x for x in runs if x.get("conclusion") == "failure"][:3]
                  if not failed:
                      return "✅ No recent workflow failures."
                  lines = ["*Recent failures:*"]
                  for f in failed:
                      name = f.get("name", "?")[:45]
                      date = f.get("createdAt", "")[:10]
                      url = f.get("url", "")
                      lines.append(f"• {name} ({date})\n  [Logs]({url})")
                  return "\n".join(lines)
              except Exception as e:
                  return f"Error fetching runs: {e}"

          # ── Help text ────────────────────────────────────────────────────────

          HELP_TEXT = (
              "*Forensic Toolkit Agent Team*\n\n"
              "Commands:\n"
              "/status — latest ecosystem health score\n"
              "/triage — run triage scan (~2 min)\n"
              "/test — run all 11 repo test suites (~10 min)\n"
              "/work — dispatch next P0/P1 fix immediately\n"
              "/orchestrate — full coordinator run + auto-dispatch (~5 min)\n"
              "/approve <repo/PR> — merge an autofix PR\n"
              "/reject <repo/PR> — close an autofix PR\n"
              "/errors — show recent workflow failures\n"
              "/help — this message"
          )

          # ── Command router ───────────────────────────────────────────────────

          def route(full_text, chat_id):
              parts = full_text.strip().split(None, 1)
              cmd = parts[0].split("@")[0].lower()  # strip bot mention
              args = parts[1].strip() if len(parts) > 1 else ""

              if cmd in ("/help", "/start"):
                  tg_send(chat_id, HELP_TEXT)

              elif cmd == "/status":
                  tg_send(chat_id, "Fetching status...")
                  tg_send(chat_id, get_status_summary())

              elif cmd == "/triage":
                  ok, err = gh_workflow_run("tier2-triage.yml")
                  if ok:
                      tg_send(chat_id, "Triage started. Results in ~2 min.")
                  else:
                      tg_send(chat_id, f"Dispatch failed: {err[:200]}")

              elif cmd == "/test":
                  ok, err = gh_workflow_run("tier1-tests.yml")
                  if ok:
                      tg_send(chat_id, "Tests running across 11 repos. Results in ~10 min.")
                  else:
                      tg_send(chat_id, f"Dispatch failed: {err[:200]}")

              elif cmd == "/orchestrate":
                  ok, err = gh_workflow_run("orchestrator.yml")
                  if ok:
                      tg_send(chat_id, "Orchestrator started. Full report in ~5 min.")
                  else:
                      tg_send(chat_id, f"Dispatch failed: {err[:200]}")

              elif cmd == "/work":
                  tg_send(chat_id, "Looking for top AI task...")
                  dispatched = dispatch_next_work_item(chat_id)
                  if not dispatched:
                      ok, err = gh_workflow_run("orchestrator.yml")
                      if ok:
                          tg_send(chat_id, "No cached brief — orchestrator started to find work.")
                      else:
                          tg_send(chat_id, f"Dispatch failed: {err[:200]}")

              elif cmd == "/approve":
                  handle_pr(cmd, args, chat_id)

              elif cmd == "/reject":
                  handle_pr(cmd, args, chat_id)

              elif cmd == "/errors":
                  tg_send(chat_id, "Fetching recent failures...")
                  tg_send(chat_id, get_recent_errors())

              elif cmd == "/ask":
                  if not args:
                      tg_send(chat_id, "Usage: `/ask <your question>`\nOr just send a message ending with ?")
                  else:
                      r = subprocess.run([
                          "gh", "workflow", "run", "telegram-bot.yml",
                          "--repo", REPO,
                          "--field", f"command=/ask",
                          "--field", f"args={args}",
                          "--field", f"chat_id={chat_id}",
                      ], capture_output=True, text=True)
                      if r.returncode == 0:
                          tg_send(chat_id, "Researching your question (~1 min)...")
                      else:
                          tg_send(chat_id, f"Dispatch failed: {r.stderr.strip()[:200]}")

              else:
                  tg_send(chat_id, f"Unknown: `{cmd}`\nSend /help for commands.")

          # ── Main ─────────────────────────────────────────────────────────────

          # Bootstrap: first run with no stored update_id.
          # Mark the current tip without processing old messages.
          if LAST_ID == 0:
              resp = tg_get("getUpdates", {"offset": -1, "limit": 1, "timeout": 0})
              if resp and resp.get("ok") and resp["result"]:
                  tip_id = resp["result"][-1]["update_id"]
                  gh_set_variable("TELEGRAM_LAST_UPDATE_ID", str(tip_id))
                  print(f"[bootstrap] Marked tip update_id={tip_id}. Ready.")
              else:
                  gh_set_variable("TELEGRAM_LAST_UPDATE_ID", "1")
                  print("[bootstrap] No updates. Initialized to 1.")
              sys.exit(0)

          # Normal poll: fetch updates after LAST_ID
          resp = tg_get("getUpdates", {
              "offset": LAST_ID + 1,
              "limit": 10,
              "timeout": 0,
          })

          if not resp or not resp.get("ok"):
              print(f"[poll] getUpdates failed: {resp}", file=sys.stderr)
              sys.exit(0)

          updates = resp.get("result", [])
          print(f"[poll] {len(updates)} update(s) since update_id={LAST_ID}")

          new_max_id = LAST_ID
          processed = 0

          for update in updates:
              uid = update.get("update_id", 0)
              new_max_id = max(new_max_id, uid)

              msg = update.get("message", {})
              if not msg:
                  continue

              chat_id = str(msg.get("chat", {}).get("id", ""))
              text    = msg.get("text", "").strip()

              # Security: only respond to the authorized chat
              if chat_id != ALLOWED_CHAT:
                  print(f"[security] Ignoring message from chat_id={chat_id}")
                  continue

              if not text.startswith("/"):
                  # Auto-detect: messages ending with ? are routed to /ask
                  if text.endswith("?"):
                      text = "/ask " + text
                  else:
                      continue  # not a command, not a question

              print(f"[cmd] {text!r}")
              route(text, chat_id)
              processed += 1

          # Persist new high-water mark
          if new_max_id > LAST_ID:
              gh_set_variable("TELEGRAM_LAST_UPDATE_ID", str(new_max_id))
              print(f"[poll] Advanced update_id: {LAST_ID} → {new_max_id}")

          print(f"[poll] Processed {processed} command(s).")
          PYEOF

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: process-command
  # Triggered by the Cloudflare Worker webhook handler via workflow_dispatch.
  # Executes a single command and sends the result back to Telegram directly.
  # ─────────────────────────────────────────────────────────────────────────────
  process-command:
    name: "Process command (${{ github.event.inputs.command }})"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.command != ''
    timeout-minutes: 10
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Execute command
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_AUTHORIZED: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_CHAT_ID: ${{ github.event.inputs.chat_id }}
          INPUT_COMMAND: ${{ github.event.inputs.command }}
          INPUT_ARGS: ${{ github.event.inputs.args }}
          GH_TOKEN: ${{ secrets.ECOSYSTEM_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys, urllib.parse, urllib.request
          from pathlib import Path

          TOKEN      = os.environ["TELEGRAM_BOT_TOKEN"]
          AUTHORIZED = str(os.environ["TELEGRAM_CHAT_ID_AUTHORIZED"]).strip()
          CHAT_ID    = str(os.environ["INPUT_CHAT_ID"]).strip()
          CMD        = os.environ["INPUT_COMMAND"].strip().lower()
          ARGS       = os.environ["INPUT_ARGS"].strip()
          REPO       = os.environ["GITHUB_REPOSITORY"]

          # Security: reject if chat_id doesn't match the stored secret
          if CHAT_ID != AUTHORIZED:
              print(f"[security] Unauthorized chat_id={CHAT_ID} — ignoring")
              sys.exit(0)

          # ── Telegram helpers ──────────────────────────────────────────────────

          def tg_send(text):
              data = urllib.parse.urlencode({
                  "chat_id": CHAT_ID, "text": text,
                  "parse_mode": "Markdown", "disable_web_page_preview": "true",
              }).encode()
              try:
                  with urllib.request.urlopen(
                      urllib.request.Request(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage", data
                      ), timeout=10
                  ) as r:
                      print(f"tg_send OK (status={r.status})")
              except Exception as e:
                  print(f"tg_send failed: {e}", file=sys.stderr)

          # ── GitHub helpers ────────────────────────────────────────────────────

          def gh_run(workflow_file):
              r = subprocess.run(
                  ["gh", "workflow", "run", workflow_file, "--repo", REPO],
                  capture_output=True, text=True,
              )
              return r.returncode == 0, r.stderr.strip()

          # ── /status ───────────────────────────────────────────────────────────

          def get_status():
              try:
                  r = subprocess.run([
                      "gh", "api",
                      f"repos/{REPO}/actions/artifacts?name=scratchpad-orchestrator&per_page=1",
                      "--jq", ".artifacts[0].id // empty",
                  ], capture_output=True, text=True)
                  artifact_id = r.stdout.strip()
                  if not artifact_id:
                      return "No orchestrator run yet. Send /orchestrate to generate a report."

                  subprocess.run([
                      "gh", "api",
                      f"repos/{REPO}/actions/artifacts/{artifact_id}/zip",
                      "--header", "Accept: application/vnd.github.v3+json",
                  ], capture_output=True,
                     stdout=open("/tmp/orch_artifact.zip", "wb"))
                  subprocess.run(
                      ["unzip", "-o", "/tmp/orch_artifact.zip", "-d", "/tmp/orch/"],
                      capture_output=True,
                  )
                  summary_path = Path("/tmp/orch/health_summary.json")
                  if summary_path.exists():
                      s = json.loads(summary_path.read_text())
                      health_raw = str(s.get("health", "0")).split("/")[0].strip()
                      score = float(health_raw) if health_raw.replace(".", "").isdigit() else 0
                      emoji = "✅" if score >= 8 else "⚠️" if score >= 5 else "🚨"
                      lines = [
                          f"{emoji} *Health: {health_raw}/10*",
                          f"P0/P1: {s.get('p0p1_count','?')} | Needs human: {s.get('needs_human_count','?')}",
                          f"Date: {s.get('date','?')}",
                      ]
                      if s.get("issue_url"):
                          lines.append(f"[Full report]({s['issue_url']})")
                      return "\n".join(lines)
                  return "Status artifact found but unreadable. Run /orchestrate to refresh."
              except Exception as e:
                  return f"Status fetch error: {e}"

          # ── /work ─────────────────────────────────────────────────────────────

          def dispatch_next_work_item():
              try:
                  r = subprocess.run([
                      "gh", "api",
                      f"repos/{REPO}/actions/artifacts?name=scratchpad-orchestrator&per_page=1",
                      "--jq", ".artifacts[0].id // empty",
                  ], capture_output=True, text=True)
                  artifact_id = r.stdout.strip()
                  if not artifact_id:
                      return False

                  subprocess.run([
                      "gh", "api",
                      f"repos/{REPO}/actions/artifacts/{artifact_id}/zip",
                      "--header", "Accept: application/vnd.github.v3+json",
                  ], capture_output=True,
                     stdout=open("/tmp/work_artifact.zip", "wb"))
                  subprocess.run(
                      ["unzip", "-o", "/tmp/work_artifact.zip", "-d", "/tmp/work/"],
                      capture_output=True,
                  )
                  orch_path = Path("/tmp/work/orchestrator.json")
                  if not orch_path.exists():
                      return False

                  data = json.loads(orch_path.read_text())
                  dispatchable = {"CONVENTION_DRIFT", "STUB", "DOC_DRIFT", "COUNT_DRIFT", "TEST_FAIL"}
                  for brief in data.get("action_briefs", []):
                      if (not brief.get("ai_actionable") or
                              brief.get("priority") not in ("P0", "P1") or
                              brief.get("category") not in dispatchable):
                          continue
                      repo_name = brief.get("repo", "")
                      if not repo_name:
                          continue
                      open_prs = subprocess.run([
                          "gh", "pr", "list", "--repo", f"pon00050/{repo_name}",
                          "--state", "open", "--json", "headRefName",
                          "--jq", '[.[] | select(.headRefName | startswith("autofix/"))] | length',
                      ], capture_output=True, text=True).stdout.strip()
                      if open_prs and open_prs != "0":
                          continue
                      payload = json.dumps({
                          "event_type": "agent-fix",
                          "client_payload": {
                              "priority": brief.get("priority"),
                              "category": brief.get("category"),
                              "repo": repo_name,
                              "description": brief.get("change", ""),
                              "file": brief.get("file"),
                              "line": brief.get("line"),
                              "ai_actionable": True,
                              "brief_id": brief.get("id", ""),
                          }
                      })
                      r2 = subprocess.run(
                          ["gh", "api", f"repos/{REPO}/dispatches",
                           "--method", "POST", "--input", "-"],
                          input=payload, text=True, capture_output=True,
                      )
                      if r2.returncode == 0:
                          tg_send(
                              f"🔧 Fixing `{repo_name}` [{brief.get('category')}]\n"
                              f"{brief.get('change','')[:100]}\n_Results in ~5 min_")
                          return True
                      else:
                          tg_send(f"Dispatch failed: {r2.stderr.strip()[:200]}")
                          return False

                  tg_send(
                      "No actionable P0/P1 items in last orchestrator run.\n"
                      "Run /orchestrate to synthesize fresh work.")
                  return False
              except Exception:
                  return False

          # ── /approve, /reject ─────────────────────────────────────────────────

          def handle_pr():
              if not ARGS:
                  tg_send(f"Usage: `{CMD} repo/pr-number`\nExample: `{CMD} kr-beneish/5`")
                  return
              ref = ARGS.strip()
              if ref.startswith("https://github.com/"):
                  parts = ref.replace("https://github.com/", "").split("/")
                  if len(parts) >= 4 and parts[2] == "pull":
                      repo_name, pr_num = parts[1], parts[3]
                  else:
                      tg_send("Could not parse URL. Use `repo/pr-number` format.")
                      return
              elif "/" in ref:
                  repo_name, pr_num = ref.split("/", 1)
              else:
                  tg_send(f"Usage: `{CMD} repo/pr-number`")
                  return

              if CMD == "/approve":
                  r = subprocess.run([
                      "gh", "pr", "merge", pr_num,
                      "--squash", "--delete-branch",
                      "--repo", f"pon00050/{repo_name}",
                  ], capture_output=True, text=True)
                  if r.returncode == 0:
                      tg_send(f"✅ `{repo_name}` PR #{pr_num} merged.")
                  else:
                      tg_send(f"Merge failed: {r.stderr.strip()[:200]}")
              else:
                  r = subprocess.run([
                      "gh", "pr", "close", pr_num,
                      "--comment", "Rejected via Telegram.",
                      "--repo", f"pon00050/{repo_name}",
                  ], capture_output=True, text=True)
                  if r.returncode == 0:
                      tg_send(f"✅ `{repo_name}` PR #{pr_num} closed.")
                  else:
                      tg_send(f"Close failed: {r.stderr.strip()[:200]}")

          # ── /errors ───────────────────────────────────────────────────────────

          def get_errors():
              try:
                  r = subprocess.run([
                      "gh", "run", "list", "--repo", REPO,
                      "--json", "name,conclusion,url,createdAt",
                      "--limit", "20",
                  ], capture_output=True, text=True)
                  if r.returncode != 0:
                      return "Could not fetch workflow runs."
                  runs = json.loads(r.stdout)
                  failed = [x for x in runs if x.get("conclusion") == "failure"][:3]
                  if not failed:
                      return "✅ No recent workflow failures."
                  lines = ["*Recent failures:*"]
                  for f in failed:
                      name = f.get("name", "?")[:45]
                      date = f.get("createdAt", "")[:10]
                      url = f.get("url", "")
                      lines.append(f"• {name} ({date})\n  [Logs]({url})")
                  return "\n".join(lines)
              except Exception as e:
                  return f"Error: {e}"

          # ── Route ─────────────────────────────────────────────────────────────

          print(f"[process-command] cmd={CMD!r} args={ARGS!r} chat_id={CHAT_ID!r}")

          if CMD == "/status":
              tg_send(get_status())

          elif CMD == "/triage":
              ok, err = gh_run("tier2-triage.yml")
              tg_send("Triage running. Results in ~2 min." if ok else f"Dispatch failed: {err[:200]}")

          elif CMD == "/test":
              ok, err = gh_run("tier1-tests.yml")
              tg_send("Tests running. Results in ~10 min." if ok else f"Dispatch failed: {err[:200]}")

          elif CMD == "/orchestrate":
              ok, err = gh_run("orchestrator.yml")
              tg_send("Orchestrator running. Full report in ~5 min." if ok else f"Dispatch failed: {err[:200]}")

          elif CMD == "/work":
              if not dispatch_next_work_item():
                  ok, err = gh_run("orchestrator.yml")
                  tg_send("No cached brief — orchestrator started to find work." if ok
                          else f"Dispatch failed: {err[:200]}")

          elif CMD in ("/approve", "/reject"):
              handle_pr()

          elif CMD == "/errors":
              tg_send(get_errors())

          elif CMD == "/ask":
              pass  # Handled by ask-question job running in parallel

          else:
              tg_send(f"Unknown: `{CMD}`\nSend /help for commands.")
          PYEOF

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: ask-question
  # Runs a Sonnet research agent against all 13 repos and sends the answer back.
  # Triggered by /ask command or any message ending with ? (auto-routed by CF Worker).
  # ─────────────────────────────────────────────────────────────────────────────
  ask-question:
    name: "Research question"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == '/ask'
    timeout-minutes: 8
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Validate chat_id
        env:
          TELEGRAM_CHAT_ID_AUTHORIZED: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: |
          if [ "$INPUT_CHAT_ID" != "$TELEGRAM_CHAT_ID_AUTHORIZED" ]; then
            echo "[security] Unauthorized chat_id — aborting"
            exit 1
          fi

      - name: Checkout all ecosystem repos
        run: |
          mkdir -p _deps
          REPOS=(kr-company-registry kr-trading-calendar kr-beneish kr-derivatives
                 jfia-catalog jfia-forensic kr-enforcement-cases kr-forensic-core
                 krff-shell kr-dart-pipeline kr-anomaly-scoring kr-stat-tests)
          for repo in "${REPOS[@]}"; do
            git clone --depth=1 "https://github.com/pon00050/$repo.git" "_deps/$repo" 2>/dev/null \
              || echo "Warning: could not clone $repo (may be private or missing)"
          done

      - name: Pre-fetch open issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _scratchpad
          gh issue list --repo ${{ github.repository }} \
            --state open --json number,title,labels --limit 30 \
            > _scratchpad/open-issues.json 2>/dev/null || echo "[]" > _scratchpad/open-issues.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install claude-agent-sdk
        run: pip install claude-agent-sdk

      - name: Run ask agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          ASK_QUESTION: ${{ github.event.inputs.args }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: python scripts/agents/ask_agent.py

      - name: Upload scratchpad
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-ask-${{ github.run_id }}
          path: _scratchpad/ask-result.json
          retention-days: 7
          if-no-files-found: ignore
