name: "Tier 1 — Test Count Sync"

on:
  workflow_run:
    workflows: ["Tier 1 — Cross-Repo Tests"]
    types: [completed]
  schedule:
    - cron: "30 23 * * *"   # 08:30 KST daily — standalone fallback if workflow_run doesn't fire
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  count-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Checkout repos with test suites
        run: |
          REPOS=(
            kr-company-registry kr-trading-calendar kr-beneish kr-derivatives
            jfia-forensic kr-enforcement-cases kr-forensic-core
            krff-shell kr-dart-pipeline kr-anomaly-scoring kr-stat-tests
          )
          for repo in "${REPOS[@]}"; do
            git clone --depth=1 "https://github.com/pon00050/$repo.git" "_deps/$repo" 2>/dev/null || \
            echo "Warning: could not clone $repo"
          done

      - name: Symlink repos
        run: bash scripts/ci/checkout-ecosystem.sh

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install deps for all repos
        run: |
          REPOS=(
            kr-trading-calendar kr-beneish kr-derivatives jfia-forensic
            kr-enforcement-cases kr-forensic-core krff-shell kr-dart-pipeline
            kr-anomaly-scoring kr-stat-tests
          )
          PARENT="$(dirname "$GITHUB_WORKSPACE")"
          for repo in "${REPOS[@]}"; do
            rpath="$PARENT/$repo"
            if [ -d "$rpath" ] && [ -f "$rpath/pyproject.toml" ]; then
              cd "$rpath"
              # --quiet suppresses progress bars; surface real errors as
              # workflow warnings so we know exactly why collection fails.
              uv sync --quiet || echo "::warning::uv sync failed for $repo — test collection will return 0 for this repo"
              cd "$GITHUB_WORKSPACE"
            fi
          done
          # kr-company-registry uses bare pytest; install package too so
          # test imports resolve correctly during collection.
          pip install pytest 2>/dev/null || true
          PARENT="$(dirname "$GITHUB_WORKSPACE")"
          pip install -e "$PARENT/kr-company-registry" 2>/dev/null || true

      - name: Run count-sync check
        run: bash scripts/ci/count-sync-check.sh

      - name: Upload scratchpad artifact
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-count-sync
          path: _scratchpad/count-sync.json
          retention-days: 90

      - name: Auto-fix CLAUDE.md counts
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          if python3 scripts/ci/autofix-count-sync.py; then
            # Commit and push the fix
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
            git add CLAUDE.md
            if ! git diff --cached --quiet; then
              git commit -m "chore: auto-sync test counts in CLAUDE.md [skip ci]"
              git push origin HEAD
              echo "AUTOFIX_APPLIED=true" >> $GITHUB_ENV
              echo "Counts committed and pushed."
            fi
            # Close any stale agent-task issues about count drift
            gh issue list --label agent-task --state open --json number,title \
              --jq '.[] | select(.title | contains("Test count drift")) | .number' \
              > /tmp/count_issues.txt 2>/dev/null || true
            while IFS= read -r n; do
              [ -n "$n" ] && gh issue close "$n" \
                --comment "Auto-fixed by count-sync workflow ($(date -u +%Y-%m-%dT%H:%M:%SZ))." || true
            done < /tmp/count_issues.txt
          else
            echo "AUTOFIX_APPLIED=false" >> $GITHUB_ENV
          fi

      - name: Create issue if counts still drift
        if: env.AUTOFIX_APPLIED != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path

          data = json.loads(Path("_scratchpad/count-sync.json").read_text())
          count = data.get("mismatch_count", 0)
          if count == 0:
              print("All test counts match CLAUDE.md — no issue needed")
              sys.exit(0)

          # Only report non-zero actual counts; actual=0 means collection failure
          real_mismatches = [m for m in data.get("mismatches", []) if m.get("actual", 0) > 0]
          if not real_mismatches:
              print("All mismatches are collection failures (env issue) — skipping issue creation")
              sys.exit(0)

          mismatch_list = "\n".join(
              f"- `{m['repo']}`: actual={m['actual']}, claimed={m['claimed']}"
              for m in real_mismatches
          )

          body = f"""## Test Count Drift in CLAUDE.md

          **Mismatches:** {len(real_mismatches)}
          **Date:** {data['generated_at']}

          ### Drifted repos
          {mismatch_list}

          ### Fix
          Auto-fix was attempted but could not be applied. Update the test count column
          in hub `CLAUDE.md` for the repos listed above.

          Actual counts from `pytest --co -q`: see `_scratchpad/count-sync.json`
          """
          result = subprocess.run([
              "gh", "issue", "create",
              "--title", f"[agent] Test count drift: {len(real_mismatches)} repos out of sync in CLAUDE.md",
              "--body", body,
              "--label", "agent-task",
          ], capture_output=True, text=True)
          if result.returncode == 0:
              print("Issue created:", result.stdout.strip())
          else:
              print("Issue creation skipped:", result.stderr.strip())
          PYEOF
