name: "Tier 3 — Convention Audit (Sonnet)"

on:
  schedule:
    - cron: "0 4 * * 0"   # Sunday 13:00 KST weekly
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Checkout all ecosystem repos
        run: |
          REPOS=(
            kr-company-registry kr-trading-calendar kr-beneish kr-derivatives
            jfia-catalog jfia-forensic kr-enforcement-cases kr-forensic-core
            krff-shell kr-dart-pipeline kr-anomaly-scoring kr-stat-tests kr-real-estate
          )
          for repo in "${REPOS[@]}"; do
            git clone --depth=5 "https://github.com/pon00050/$repo.git" "_deps/$repo" 2>/dev/null || \
            echo "Warning: could not clone $repo"
          done

      - name: Symlink repos
        run: bash scripts/ci/checkout-ecosystem.sh

      - name: Download previous audit (for delta reporting)
        uses: actions/download-artifact@v4
        with:
          name: scratchpad-convention-audit
          path: _scratchpad/
        continue-on-error: true   # First run won't have previous artifact

      - name: Rename prev audit for delta
        run: |
          if [ -f "_scratchpad/convention-audit.json" ]; then
            cp "_scratchpad/convention-audit.json" "_scratchpad/convention-audit-prev.json"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install claude-agent-sdk
        run: pip install claude-agent-sdk

      - name: Run convention audit agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python scripts/agents/convention_audit_agent.py

      - name: Upload scratchpad artifact
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-convention-audit
          path: _scratchpad/convention-audit.json
          retention-days: 90

      - name: Create issue with audit report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path
          from datetime import datetime, timezone

          path = Path("_scratchpad/convention-audit.json")
          if not path.exists():
              print("No audit output — skipping")
              sys.exit(0)

          data = json.loads(path.read_text())
          ok = data.get("ok_count", 0)
          drift = data.get("drift_count", 0)
          miss = data.get("miss_count", 0)
          exempt = data.get("exempt_count", 0)
          new_devs = data.get("new_deviations_since_last", "?")
          total_checks = data.get("total_checks", 182)

          top = data.get("top_deviations", [])[:10]
          dev_list = "\n".join(
              f"- {'🆕 ' if d.get('is_new') else ''}[{d.get('severity','?')}] `{d.get('repo','?')}` — "
              f"{d.get('convention','?')}: {d.get('detail','')[:100]}"
              for d in top
          ) or "No deviations found."

          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          body = f"""## Convention Audit — {date}

          ### Summary
          - ✅ OK: {ok}/{total_checks}
          - ⚠️ DRIFT: {drift}
          - ❌ MISS: {miss}
          - 🔵 EXEMPT: {exempt}
          - 🆕 New since last audit: {new_devs}

          ### Top Deviations
          {dev_list}

          ### Full Report
          See `_scratchpad/convention-audit.json` in the workflow artifacts.

          ---
          *Generated by tier3-convention-audit workflow*
          """

          # Close previous convention audit issues
          result = subprocess.run([
              "gh", "issue", "list", "--label", "agent:convention-audit",
              "--state", "open", "--json", "number"
          ], capture_output=True, text=True)
          if result.returncode == 0:
              try:
                  for issue in json.loads(result.stdout):
                      subprocess.run(["gh", "issue", "close", str(issue["number"])],
                                     capture_output=True)
              except Exception:
                  pass

          result = subprocess.run([
              "gh", "issue", "create",
              "--title", f"[convention-audit] {ok}/{total_checks} OK — {drift+miss} deviations — {date}",
              "--body", body,
              "--label", "agent:convention-audit",
          ], capture_output=True, text=True)
          print("Issue:", result.stdout.strip() or result.stderr.strip())
          PYEOF
