name: "Orchestrator — Coordinator (Sonnet)"

on:
  schedule:
    - cron: "0 6 * * 1-5"   # Mon–Fri 15:00 KST (daily weekdays)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Download all latest scratchpad artifacts
        # Download in parallel order matches Research phase (Principle #11)
        continue-on-error: true
        run: |
          mkdir -p _scratchpad
          # Download artifacts from all worker workflows
          # Use gh CLI to get latest artifact from each workflow
          ARTIFACTS=(
            "scratchpad-tests:test-results.json"
            "scratchpad-triage:triage.json"
            "scratchpad-convention-audit:convention-audit.json"
            "scratchpad-doc-drift:doc-drift.json"
            "scratchpad-count-sync:count-sync.json"
            "scratchpad-data-validation:data-validation.json"
            "scratchpad-pipeline:pipeline.json"
          )
          for entry in "${ARTIFACTS[@]}"; do
            artifact_name="${entry%%:*}"
            file_name="${entry##*:}"
            gh api "repos/${{ github.repository }}/actions/artifacts?name=${artifact_name}&per_page=1" \
              --jq '.artifacts[0].id // empty' > /tmp/artifact_id 2>/dev/null || true
            artifact_id=$(cat /tmp/artifact_id)
            if [ -n "$artifact_id" ]; then
              gh api "repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" \
                --header "Accept: application/vnd.github.v3+json" > /tmp/artifact.zip 2>/dev/null && \
              unzip -o /tmp/artifact.zip "$file_name" -d _scratchpad/ 2>/dev/null && \
              echo "Downloaded: $file_name" || echo "Could not extract: $file_name"
            else
              echo "Artifact not found: $artifact_name"
            fi
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Pre-fetch open issues for coordinator injection
        # MM#3 coordinator purity: the orchestrator agent has no tools.
        # All data it needs must be fetched here and placed in _scratchpad/.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _scratchpad
          gh issue list \
            --state open \
            --label "agent-task" \
            --json number,title,createdAt,labels \
            --limit 50 \
            > _scratchpad/open-issues.json 2>/dev/null \
            || echo "[]" > _scratchpad/open-issues.json
          echo "Open issues fetched: $(wc -l < _scratchpad/open-issues.json) chars"

      - name: Show available scratchpad files
        run: ls -la _scratchpad/ || echo "Scratchpad empty"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install claude-agent-sdk
        run: pip install claude-agent-sdk

      - name: Run orchestrator agent (THE COORDINATOR BRAIN)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          # MM#14: coordinator mode — agent receives pre-injected data, uses zero tools
          CLAUDE_CODE_COORDINATOR_MODE: "true"
        run: python scripts/agents/orchestrator_agent.py

      - name: Upload orchestrator artifact
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-orchestrator
          path: |
            _scratchpad/orchestrator.json
            _scratchpad/health_summary.json
            _scratchpad/escalation.md
            _scratchpad/task-notifications.jsonl
          retention-days: 90
          if-no-files-found: ignore

      - name: Handle escalation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f "_scratchpad/escalation.md" ]; then
            echo "ESCALATION DETECTED — creating urgent issue"
            gh issue create \
              --title "[ESCALATION] Orchestrator requires human review" \
              --body "$(cat _scratchpad/escalation.md)" \
              --label "needs-human,priority:p0" || true
          fi

      - name: Dispatch agent-fix for AI-actionable P0/P1 items
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path

          path = Path("_scratchpad/orchestrator.json")
          if not path.exists():
              print("No orchestrator.json — skipping dispatch")
              sys.exit(0)

          data = json.loads(path.read_text())
          briefs = data.get("action_briefs", [])
          repo_api = "${{ github.repository }}"

          # Dispatch for AI-actionable P0/P1 that aren't TEST_FAIL
          # (TEST_FAIL is dispatched by tier1-tests already)
          dispatchable_categories = {"CONVENTION_DRIFT", "STUB", "DOC_DRIFT", "COUNT_DRIFT"}
          to_dispatch = [
              b for b in briefs
              if b.get("ai_actionable")
              and b.get("priority") in ("P0", "P1")
              and b.get("category") in dispatchable_categories
          ]

          dispatched = 0
          for brief in to_dispatch[:5]:  # cap at 5 per run to avoid runaway costs
              repo = brief.get("repo", "")
              if not repo:
                  continue

              # Skip if open autofix PR already exists for this repo
              open_prs = subprocess.run([
                  "gh", "pr", "list", "--repo", f"pon00050/{repo}",
                  "--state", "open", "--json", "headRefName",
                  "--jq", '[.[] | select(.headRefName | startswith("autofix/"))] | length',
              ], capture_output=True, text=True).stdout.strip()
              if open_prs and open_prs != "0":
                  print(f"  Skipping {repo} [{brief.get('category')}] — autofix PR in flight")
                  continue

              # Resolve issue_number: prefer the number written back by
              # _create_issue() in orchestrator_agent.py; fall back to a
              # title-keyword lookup in open-issues.json for issues created
              # by other workflows (triage, convention-check, etc.).
              issue_number = brief.get("issue_number")
              if not issue_number:
                  open_issues_path = Path("_scratchpad/open-issues.json")
                  if open_issues_path.exists():
                      try:
                          open_issues = json.loads(open_issues_path.read_text())
                          cat = brief.get("category", "")
                          for oi in open_issues:
                              title = oi.get("title", "")
                              if repo in title and cat in title:
                                  issue_number = oi["number"]
                                  break
                      except Exception:
                          pass

              payload = {
                  "event_type": "agent-fix",
                  "client_payload": {
                      "priority": brief.get("priority"),
                      "category": brief.get("category"),
                      "repo": repo,
                      "description": brief.get("change", ""),
                      "file": brief.get("file"),
                      "line": brief.get("line"),
                      "command": brief.get("command"),
                      "ai_actionable": True,
                      "brief_id": brief.get("id", ""),
                      "issue_number": issue_number,
                  }
              }
              r = subprocess.run(
                  ["gh", "api", f"repos/{repo_api}/dispatches",
                   "--method", "POST", "--input", "-"],
                  input=json.dumps(payload), text=True, capture_output=True,
              )
              if r.returncode == 0:
                  print(f"  Dispatched agent-fix: {repo} [{brief.get('category')}]")
                  dispatched += 1
              else:
                  print(f"  Dispatch failed: {r.stderr.strip()[:100]}")

          print(f"Dispatched {dispatched} agent-fix event(s) from orchestrator")
          PYEOF

      - name: Post orchestrator summary issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path
          from datetime import datetime, timezone

          path = Path("_scratchpad/orchestrator.json")
          if not path.exists():
              print("No orchestrator.json — skipping summary")
              sys.exit(0)

          data = json.loads(path.read_text())
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          health = data.get("ecosystem_health_score", "?")
          narrative = data.get("health_narrative", "")
          briefs = data.get("action_briefs", [])
          needs_human = data.get("needs_human", [])
          verification = data.get("verification", {})

          p0p1 = [b for b in briefs if b.get("priority") in ("P0", "P1")]
          p2p3 = [b for b in briefs if b.get("priority") in ("P2", "P3")]

          action_list = "\n".join(
              f"- [{b['priority']}] `{b.get('repo','?')}`: {b.get('change','')[:100]}"
              for b in p0p1[:8]
          ) or "No P0/P1 issues."

          human_list = "\n".join(
              f"- {h['item']}: {h['reason']}"
              for h in needs_human
          ) or "None"

          body = f"""## Ecosystem Orchestrator — {date}

          ### Health: {health}/10
          {narrative}

          ### P0/P1 Action Items ({len(p0p1)} issues created)
          {action_list}

          ### P2/P3 ({len(p2p3)} items — batched)
          See separate issue.

          ### Needs Human
          {human_list}

          ### Verification
          - Previous issues resolved: {verification.get('resolved_since_last_run', '?')}
          - Still open: {verification.get('persistent_unresolved', '?')}

          ---
          *Generated by orchestrator agent*
          """

          result = subprocess.run([
              "gh", "issue", "create",
              "--title", f"[orchestrator] Ecosystem health {health}/10 — {date}",
              "--body", body,
              "--label", "agent:orchestrator",
          ], capture_output=True, text=True)
          issue_url = result.stdout.strip() or result.stderr.strip()
          print("Summary issue:", issue_url)

          # Write issue URL for Telegram step
          Path("_scratchpad/issue_url.txt").write_text(issue_url)
          Path("_scratchpad/health_summary.json").write_text(json.dumps({
              "health": health,
              "p0p1_count": len(p0p1),
              "p2p3_count": len(p2p3),
              "needs_human_count": len(needs_human),
              "issue_url": issue_url,
              "date": date,
          }))
          PYEOF

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Skip gracefully if secrets not configured
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping notification"
            exit 0
          fi

          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.parse
          from pathlib import Path

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]

          summary_path = Path("_scratchpad/health_summary.json")
          if summary_path.exists():
              s = json.loads(summary_path.read_text())
              health = s.get("health", "?")
              p0p1 = s.get("p0p1_count", 0)
              p2p3 = s.get("p2p3_count", 0)
              needs_human = s.get("needs_human_count", 0)
              issue_url = s.get("issue_url", "")
              date = s.get("date", "")
              # Health emoji
              score = float(health) if str(health).replace('.','').isdigit() else 0
              emoji = "✅" if score >= 8 else "⚠️" if score >= 5 else "🚨"
              text = (
                  f"{emoji} *Forensic Toolkit — {date}*\n"
                  f"Health: {health}/10\n"
                  f"P0/P1 issues: {p0p1} | P2/P3: {p2p3}\n"
                  f"Needs human: {needs_human}\n"
              )
              if issue_url:
                  text += f"[Full report]({issue_url})"
          else:
              text = "⚠️ Orchestrator ran but produced no summary."

          data = urllib.parse.urlencode({
              "chat_id": chat_id,
              "text": text,
              "parse_mode": "Markdown",
              "disable_web_page_preview": "true",
          }).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  print("Telegram sent:", resp.status)
          except Exception as e:
              print(f"Telegram failed (non-critical): {e}")
          PYEOF
