name: "Tier 1 — Cross-Repo Tests"

on:
  # schedule cron removed 2026-06-17 — project shelved (see RESUMING.md). Restore to resume autonomous runs.
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  test:
    name: "test (${{ matrix.repo }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: kr-company-registry
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: false
          - repo: kr-trading-calendar
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: false
          - repo: kr-beneish
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: false
          - repo: kr-derivatives
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: false
          - repo: jfia-forensic
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: false
          - repo: kr-enforcement-cases
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: false
          - repo: kr-forensic-core
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: false
          - repo: kr-dart-pipeline
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: true
          - repo: kr-anomaly-scoring
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: true
          - repo: kr-stat-tests
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: true
          - repo: krff-shell
            test_cmd: "uv run pytest tests/ -v"
            needs_siblings: true

    steps:
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: pon00050/${{ matrix.repo }}
          path: ${{ matrix.repo }}

      # Sibling repos needed by platform repos (kr-forensic-core + pipeline deps)
      - name: Checkout kr-forensic-core (sibling)
        if: matrix.needs_siblings
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-forensic-core
          path: _deps/kr-forensic-core

      - name: Checkout kr-trading-calendar (sibling)
        if: matrix.needs_siblings
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-trading-calendar
          path: _deps/kr-trading-calendar

      - name: Checkout kr-company-registry (sibling)
        if: matrix.needs_siblings
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-company-registry
          path: _deps/kr-company-registry

      - name: Checkout kr-dart-pipeline (sibling for anomaly/stat/krff)
        if: matrix.repo == 'kr-anomaly-scoring' || matrix.repo == 'kr-stat-tests' || matrix.repo == 'krff-shell'
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-dart-pipeline
          path: _deps/kr-dart-pipeline

      - name: Checkout kr-anomaly-scoring (sibling for krff-shell)
        if: matrix.repo == 'krff-shell'
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-anomaly-scoring
          path: _deps/kr-anomaly-scoring

      - name: Checkout kr-stat-tests (sibling for krff-shell)
        if: matrix.repo == 'krff-shell'
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-stat-tests
          path: _deps/kr-stat-tests

      - name: Symlink sibling repos to expected relative paths
        if: matrix.needs_siblings
        run: |
          # Symlinks go at $GITHUB_WORKSPACE/<dep> so that relative paths like
          # ../kr-forensic-core resolve correctly from $GITHUB_WORKSPACE/<repo>/
          for repo in kr-forensic-core kr-trading-calendar kr-company-registry kr-dart-pipeline kr-anomaly-scoring kr-stat-tests; do
            src="$GITHUB_WORKSPACE/_deps/$repo"
            dst="$GITHUB_WORKSPACE/$repo"
            if [ -d "$src" ] && [ ! -e "$dst" ]; then
              ln -s "$src" "$dst"
            fi
          done

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ${{ matrix.repo }}
        run: uv sync --extra dev 2>/dev/null || uv sync

      - name: Run tests
        id: run_tests
        working-directory: ${{ matrix.repo }}
        run: ${{ matrix.test_cmd }}
        continue-on-error: true

      - name: Collect result
        run: |
          STATUS="${{ steps.run_tests.outcome }}"
          echo "REPO=${{ matrix.repo }}" >> "$GITHUB_OUTPUT"
          echo "STATUS=$STATUS" >> "$GITHUB_OUTPUT"
        id: result

      - name: Upload test result
        uses: actions/upload-artifact@v4
        with:
          name: test-result-${{ matrix.repo }}
          path: ${{ matrix.repo }}/test-results*.xml
          if-no-files-found: ignore

  summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Build test-results.json
        run: |
          mkdir -p _scratchpad
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone

          # Read job results from the matrix — GitHub sets outcome in needs context
          # We reconstruct from workflow job results via gh CLI
          results = {}
          REPOS = [
              "kr-company-registry","kr-trading-calendar","kr-beneish","kr-derivatives",
              "jfia-forensic","kr-enforcement-cases","kr-forensic-core","kr-dart-pipeline",
              "kr-anomaly-scoring","kr-stat-tests","krff-shell"
          ]
          # Will be populated by the gh CLI step below
          data = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "repos": REPOS,
              "note": "Individual results captured per job; summary requires gh CLI"
          }
          with open("_scratchpad/test-results.json", "w") as f:
              json.dump(data, f, indent=2)
          print("test-results.json written")
          PYEOF

      - name: Fetch per-job outcomes via gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get this workflow run's job statuses
          RUN_ID="${{ github.run_id }}"
          gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.name | startswith("test (")) | {name, conclusion}' \
            > /tmp/job_statuses.jsonl || echo "gh api unavailable" > /tmp/job_statuses.jsonl

          python3 - <<'PYEOF'
          import json, sys
          from datetime import datetime, timezone
          from pathlib import Path

          jobs = []
          try:
              for line in open("/tmp/job_statuses.jsonl"):
                  line = line.strip()
                  if line.startswith("{"):
                      jobs.append(json.loads(line))
          except Exception:
              pass

          results = {}
          for job in jobs:
              # name format: "test (kr-beneish)"
              name = job.get("name", "")
              if "(" in name:
                  repo = name.split("(")[1].rstrip(")")
                  conclusion = job.get("conclusion", "unknown")
                  results[repo] = "PASS" if conclusion == "success" else "FAIL"

          passed = sum(1 for v in results.values() if v == "PASS")
          failed = sum(1 for v in results.values() if v == "FAIL")

          data = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "summary": {"passed": passed, "failed": failed, "total": passed + failed},
              "results": results
          }
          Path("_scratchpad/test-results.json").write_text(json.dumps(data, indent=2))
          print(f"Test summary: {passed} passed, {failed} failed")
          if failed:
              print("FAILED repos:", [r for r, v in results.items() if v == "FAIL"])
          PYEOF

      - name: Upload scratchpad artifact
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-tests
          path: _scratchpad/test-results.json
          retention-days: 90

      - name: Create issue if failures
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path

          data = json.loads(Path("_scratchpad/test-results.json").read_text())
          failed = [r for r, v in data.get("results", {}).items() if v == "FAIL"]
          if not failed:
              print("All tests passed — no issue needed")
              sys.exit(0)

          body = f"""## Test Failures Detected

          **Run:** {{"${{ github.run_id }}"}}
          **Date:** {data['generated_at']}

          ### Failed repos
          """ + "\n".join(f"- `{r}`" for r in failed) + """

          ### Next step
          Run `bash ecosystem.sh test <repo>` locally to reproduce, or check the workflow logs.

          Labels: `agent-task`, `priority:p0`
          """
          result = subprocess.run([
              "gh", "issue", "create",
              "--title", f"[agent] Test failures: {', '.join(failed)}",
              "--body", body,
              "--label", "agent-task",
          ], capture_output=True, text=True)
          if result.returncode == 0:
              print("Issue created:", result.stdout.strip())
          else:
              print("Issue creation skipped (may already exist):", result.stderr.strip())
          PYEOF

      - name: Dispatch agent-fix for failed repos
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path

          data = json.loads(Path("_scratchpad/test-results.json").read_text())
          failed = [r for r, v in data.get("results", {}).items() if v == "FAIL"]
          if not failed:
              print("No failures — no dispatch needed")
              sys.exit(0)

          repo_api = "${{ github.repository }}"
          dispatched = 0
          for repo in failed:
              # Skip if an open agent-task issue already exists for this repo's tests
              existing = subprocess.run([
                  "gh", "issue", "list", "--label", "agent-task", "--state", "open",
                  "--json", "title",
                  "--jq", f'.[] | select(.title | contains("{repo}")) | .title',
              ], capture_output=True, text=True).stdout.strip()
              if existing:
                  print(f"  Skipping {repo} — open issue already exists")
                  continue

              payload = {
                  "event_type": "agent-fix",
                  "client_payload": {
                      "priority": "P0",
                      "category": "TEST_FAIL",
                      "repo": repo,
                      "description": f"Test suite failing in {repo}. Investigate and fix.",
                      "ai_actionable": True,
                  }
              }
              r = subprocess.run(
                  ["gh", "api", f"repos/{repo_api}/dispatches",
                   "--method", "POST", "--input", "-"],
                  input=json.dumps(payload), text=True, capture_output=True,
              )
              if r.returncode == 0:
                  print(f"  Dispatched agent-fix for {repo}")
                  dispatched += 1
              else:
                  print(f"  Dispatch failed for {repo}: {r.stderr.strip()[:80]}")

          print(f"Dispatched {dispatched} agent-fix event(s)")
          PYEOF

      - name: Telegram failure alert
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured — skipping"
            exit 0
          fi
          python3 - <<'PYEOF'
          import json, os, urllib.parse, urllib.request
          from pathlib import Path

          token   = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]

          path = Path("_scratchpad/test-results.json")
          if not path.exists():
              print("No test-results.json — skipping notification")
              exit(0)

          data = json.loads(path.read_text())
          failed = [r for r, v in data.get("results", {}).items() if v == "FAIL"]
          if not failed:
              print("All tests passed — no Telegram alert needed")
              exit(0)

          run_url = (f"{os.environ.get('GITHUB_SERVER_URL','https://github.com')}/"
                     f"{os.environ.get('GITHUB_REPOSITORY','')}/"
                     f"actions/runs/{os.environ.get('GITHUB_RUN_ID','0')}")
          text = (f"🚨 *Test failures detected*\n"
                  f"Failed: {', '.join(f'`{r}`' for r in failed)}\n"
                  f"[View logs]({run_url})")

          enc = urllib.parse.urlencode({
              "chat_id": chat_id, "text": text,
              "parse_mode": "Markdown", "disable_web_page_preview": "true",
          }).encode()
          try:
              with urllib.request.urlopen(
                  urllib.request.Request(
                      f"https://api.telegram.org/bot{token}/sendMessage", enc
                  ), timeout=10
              ) as r:
                  print("Telegram sent:", r.status)
          except Exception as e:
              print(f"Telegram failed (non-critical): {e}")
          PYEOF
