name: "Tier 3 — Pipeline Runner"

on:
  schedule:
    - cron: "0 3 * * 1"   # Monday 12:00 KST weekly
  workflow_dispatch:

# Human approval gate (Task 10): environment 'production' requires manual review
# Set up at: Settings > Environments > production > Required reviewers: pon00050

permissions:
  issues: write
  contents: read

jobs:
  approve:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Gate approved
        run: echo "Pipeline run approved by human reviewer"

  pipeline:
    runs-on: ubuntu-latest
    needs: approve
    timeout-minutes: 60
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Checkout krff-shell
        uses: actions/checkout@v4
        with:
          repository: pon00050/krff-shell
          path: _deps/krff-shell

      - name: Checkout kr-dart-pipeline
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-dart-pipeline
          path: _deps/kr-dart-pipeline

      - name: Checkout kr-forensic-core (dependency)
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-forensic-core
          path: _deps/kr-forensic-core

      - name: Checkout kr-company-registry (dependency)
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-company-registry
          path: _deps/kr-company-registry

      - name: Checkout kr-trading-calendar (dependency)
        uses: actions/checkout@v4
        with:
          repository: pon00050/kr-trading-calendar
          path: _deps/kr-trading-calendar

      - name: Symlink repos
        run: bash scripts/ci/checkout-ecosystem.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: |
          # krff-shell has 25+ heavy deps (kaleido, marimo, fastmcp, boto3...) that
          # can't install in a clean CI container. Run kr-dart-pipeline directly —
          # it's the actual ETL engine; krff-shell is only the delivery shell.
          #
          # Install sibling packages as editable first so pip doesn't resolve them
          # from PyPI (they may be unpublished or outdated there).
          for pkg in kr-forensic-core kr-trading-calendar kr-company-registry kr-dart-pipeline; do
            rpath="$GITHUB_WORKSPACE/_deps/$pkg"
            if [ -d "$rpath" ]; then
              pip install -e "$rpath" --quiet 2>&1 | tail -2 || \
                echo "::warning::pip install -e failed for $pkg"
            fi
          done
          # Runtime deps not covered by the editable installs above
          pip install opendartreader pykrx requests lxml tqdm python-dotenv \
            "typer>=0.9.0" pandas pyarrow claude-agent-sdk --quiet 2>&1 | tail -3

      - name: Run pipeline agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p _scratchpad
          python3 - <<'PYEOF'
          import asyncio, json, os, sys
          from pathlib import Path
          sys.path.insert(0, "scripts/agents")
          from _sdk_helpers import load_context, write_scratchpad, run_agent

          workspace = os.environ.get("GITHUB_WORKSPACE", ".")
          parent = str(Path(workspace).parent)
          static_context = load_context()

          PIPELINE_PROMPT = f"""
          You are a pipeline execution agent. Your job is to run the kr-dart-pipeline
          ETL extractors and produce parquet outputs for downstream analysis.

          Working context:
          - kr-dart-pipeline path: {parent}/kr-dart-pipeline
          - Output directory: {parent}/krff-shell/01_Data/processed/  (create if missing)
          - Hub scratchpad: {workspace}/_scratchpad/
          - DART_API_KEY is set in the environment

          IMPORTANT: pykrx is geo-blocked on cloud IPs. Any extractor that calls
          pykrx will fail — skip it and note the error. Use only DART/REST-based
          extractors that don't require pykrx.

          Steps to execute:
          1. Read {parent}/kr-dart-pipeline/CLAUDE.md — understand available extractors
             and how to invoke the CLI.
          2. Create output dir: mkdir -p {parent}/krff-shell/01_Data/processed/
          3. Run the pipeline CLI in sample/test mode to produce parquets:
               cd {parent}/kr-dart-pipeline && python -m kr_dart_pipeline.cli --help
             Then run whatever sample/test command the CLI exposes. Target: at least
             one parquet file in the output dir with rows > 0.
          4. Validate: for each .parquet produced, confirm rows > 0 with pandas.
          5. Write to {workspace}/_scratchpad/pipeline.json:
             {{"status":"ok|partial|error","stages_completed":[],"parquet_counts":{{}},"errors":[]}}

          Rules:
          - Do NOT push to git. Do NOT modify source files.
          - If pykrx-dependent stages fail, skip them and continue with DART-only stages.
          - Follow CLAUDE.md — it is authoritative over this prompt.
          - If the CLI is not yet functional, run one extractor module directly:
              python -m kr_dart_pipeline.extractors.<name> --sample 20
          """

          async def main():
              from claude_agent_sdk import ClaudeAgentOptions
              options = ClaudeAgentOptions(
                  system_prompt=static_context + "\\n\\nYou are a pipeline execution agent.",
                  allowed_tools=["Bash", "Read", "Glob"],
                  permission_mode="bypassPermissions",
                  max_turns=40,
                  max_budget_usd=5.00,
                  model="claude-sonnet-4-6",
                  cwd=f"{parent}/kr-dart-pipeline",
              )
              await run_agent(PIPELINE_PROMPT, options,
                              escalation_context="Pipeline execution failed on GitHub Actions runner")

          asyncio.run(main())
          PYEOF

      - name: Upload parquets as artifacts (Principle #10 — file-based IPC)
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-parquets
          path: _deps/krff-shell/01_Data/processed/*.parquet
          retention-days: 30
          if-no-files-found: warn

      - name: Upload pipeline scratchpad
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-pipeline
          path: _scratchpad/pipeline.json
          retention-days: 90
          if-no-files-found: ignore

      # Principle #11: Implementation → Verification
      # Trigger data validation after pipeline completes
      # (tier2-data-validate listens on workflow_run trigger)
