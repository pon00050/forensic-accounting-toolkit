name: "Tier 4 — Agent Fix Worker"

# Triggered by other workflows via repository_dispatch when a P0/P1 issue
# is AI-actionable and no existing open fix PR is in-flight for that repo.
# Also supports manual trigger for ad-hoc fix runs.

on:
  repository_dispatch:
    types: [agent-fix]
  workflow_dispatch:
    inputs:
      fix_brief:
        description: 'JSON fix brief e.g. {"priority":"P0","category":"TEST_FAIL","repo":"kr-beneish","description":"..."}'
        required: true
        default: '{}'

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Validate ECOSYSTEM_PAT scope
        env:
          GH_TOKEN: ${{ secrets.ECOSYSTEM_PAT != '' && secrets.ECOSYSTEM_PAT || github.token }}
        run: |
          if [ -z "${{ secrets.ECOSYSTEM_PAT }}" ]; then
            echo "::warning::ECOSYSTEM_PAT is not configured. Tier 4 will fall back to github.token, which cannot push to sibling repos or create cross-repo PRs. Add ECOSYSTEM_PAT (scoped to all 13 ecosystem repos) in Settings > Secrets."
          else
            # Verify the PAT can see at least one sibling repo
            STATUS=$(gh api "repos/pon00050/kr-beneish" --jq '.name' 2>/dev/null || echo "FAIL")
            if [ "$STATUS" = "FAIL" ]; then
              echo "::warning::ECOSYSTEM_PAT is set but cannot access pon00050/kr-beneish. Verify the PAT has repo scope for all 13 ecosystem repos."
            else
              echo "ECOSYSTEM_PAT validated — sibling repo access confirmed."
            fi
          fi

      - name: Write fix brief to scratchpad
        run: |
          mkdir -p _scratchpad
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # toJSON produces valid JSON with only double-quoted strings.
            # Single-quoting the shell argument avoids double-quote conflicts.
            cat << 'BRIEF_EOF' > /tmp/fix-brief-raw.json
          ${{ toJSON(github.event.client_payload) }}
          BRIEF_EOF
            # Pretty-print and validate the JSON
            python3 -c "
          import json, sys
          data = json.load(open('/tmp/fix-brief-raw.json'))
          with open('_scratchpad/fix-brief.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('Fix brief:', json.dumps(data, indent=2))
          "
          else
            echo '${{ github.event.inputs.fix_brief }}' > _scratchpad/fix-brief.json
          fi

      - name: Parse target repo and check for in-flight PRs
        id: parse
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO=$(python3 -c "
          import json
          d = json.load(open('_scratchpad/fix-brief.json'))
          print(d.get('repo', ''))
          ")
          echo "target_repo=$REPO" >> $GITHUB_OUTPUT

          # Skip if an autofix PR is already open for this repo
          OPEN_PRS=$(gh pr list --repo "pon00050/$REPO" --state open \
            --json headRefName --jq '[.[] | select(.headRefName | startswith("autofix/"))] | length' \
            2>/dev/null || echo "0")
          echo "open_fix_prs=$OPEN_PRS" >> $GITHUB_OUTPUT
          echo "Target repo: $REPO | Open autofix PRs: $OPEN_PRS"

      - name: Skip if fix PR already in flight
        if: steps.parse.outputs.open_fix_prs != '0'
        run: |
          echo "An autofix PR already exists for ${{ steps.parse.outputs.target_repo }} — skipping."
          exit 0

      - name: Checkout target repo
        if: steps.parse.outputs.target_repo != '' && steps.parse.outputs.open_fix_prs == '0'
        uses: actions/checkout@v4
        with:
          repository: pon00050/${{ steps.parse.outputs.target_repo }}
          path: _target_repo
          # ECOSYSTEM_PAT needed to push fix branches to sibling repos.
          # Falls back to GITHUB_TOKEN (read-only for sibling repos) if PAT not configured.
          token: ${{ secrets.ECOSYSTEM_PAT != '' && secrets.ECOSYSTEM_PAT || github.token }}

      - name: Set up Python
        if: steps.parse.outputs.open_fix_prs == '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        if: steps.parse.outputs.open_fix_prs == '0'
        with:
          enable-cache: true

      - name: Install target repo deps
        if: steps.parse.outputs.target_repo != '' && steps.parse.outputs.open_fix_prs == '0'
        run: |
          cd _target_repo
          uv sync --extra dev 2>/dev/null || uv sync 2>/dev/null || pip install pytest 2>/dev/null || true

      - name: Install claude-agent-sdk
        if: steps.parse.outputs.open_fix_prs == '0'
        run: pip install claude-agent-sdk

      - name: Run fix agent (Sonnet)
        if: steps.parse.outputs.open_fix_prs == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python scripts/agents/fix_agent.py

      - name: Run verify agent — independent post-fix verification (MM#5)
        # Fresh Sonnet agent with no knowledge of fix_agent session (MM#5 gate).
        # Runs full test suite independently and writes verify-result.json.
        # PR creation is gated on verify-result.json status == "pass".
        if: steps.parse.outputs.open_fix_prs == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python scripts/agents/verify_agent.py

      - name: Create PR if agent fixed the issue
        if: always() && steps.parse.outputs.open_fix_prs == '0'
        env:
          # Use ECOSYSTEM_PAT to push to sibling repos; fall back to hub token
          GH_TOKEN: ${{ secrets.ECOSYSTEM_PAT != '' && secrets.ECOSYSTEM_PAT || github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          result_path = workspace / "_scratchpad" / "fix-result.json"
          if not result_path.exists():
              print("No fix-result.json — agent did not complete")
              sys.exit(0)

          result = json.loads(result_path.read_text(encoding="utf-8"))
          status = result.get("status")
          repo = result.get("repo", "")
          summary = result.get("summary", "No summary.")
          changed = result.get("changed_files", [])

          # MM#5 self-verification gate: PR requires independent verify_agent approval.
          # fix_agent writes "self_verified"; verify_agent must confirm "pass".
          verify_path = workspace / "_scratchpad" / "verify-result.json"
          if verify_path.exists():
              verify = json.loads(verify_path.read_text(encoding="utf-8"))
              verify_status = verify.get("status", "unknown")
              if verify_status == "skipped":
                  # Verify skipped because fix_agent didn't self-verify — treat as needs_human
                  print(f"[gate] verify_agent skipped (fix_agent status was {status}) — no PR")
                  verify_status = "fail"
              elif verify_status != "pass":
                  print(f"[gate] verify_agent returned status={verify_status} — blocking PR")
                  failed = verify.get("failed_tests", [])[:5]
                  summary = f"Fix self-verified but verify_agent failed: {', '.join(failed) or 'see logs'}"
                  status = "needs_human"
                  changed = []
              else:
                  print(f"[gate] verify_agent PASS — proceeding to PR creation")
                  # Elevate status from self_verified → fixed only after independent verification
                  if status == "self_verified":
                      status = "fixed"
          else:
              # verify-result.json absent means verify_agent didn't run (error)
              print("[gate] verify-result.json missing — blocking PR (verify agent did not run)")
              status = "needs_human"
              changed = []

          if status != "fixed" or not changed:
              print(f"Status={status} — no PR to create")
              brief_path = workspace / "_scratchpad" / "fix-brief.json"
              brief = json.loads(brief_path.read_text()) if brief_path.exists() else {}
              issue_num = brief.get("issue_number")
              if status == "needs_human":
                  # Comment on originating issue
                  if issue_num:
                      subprocess.run([
                          "gh", "issue", "comment", str(issue_num),
                          "--body",
                          f"Fix agent could not auto-resolve (status=needs_human):\n\n{summary}\n\n"
                          f"Manual investigation required.",
                      ], check=False)
              # Write signal for Telegram step
              (workspace / "_scratchpad" / "pr-result.json").write_text(
                  json.dumps({
                      "status": status, "repo": repo, "summary": summary,
                      "category": brief.get("category", ""), "changed_files": [], "pr_url": None,
                  })
              )
              sys.exit(0)

          target = workspace / "_target_repo"
          run_id = os.environ.get("GITHUB_RUN_ID", "0")
          branch = f"autofix/{repo}-{run_id}"
          pat = os.environ.get("GH_TOKEN", "")

          try:
              for cmd in [
                  ["git", "-C", str(target), "config", "user.name", "github-actions[bot]"],
                  ["git", "-C", str(target), "config", "user.email",
                   "github-actions[bot]@users.noreply.github.com"],
                  ["git", "-C", str(target), "checkout", "-b", branch],
                  ["git", "-C", str(target), "add", "-A"],
              ]:
                  subprocess.run(cmd, check=True)

              staged = subprocess.run(
                  ["git", "-C", str(target), "diff", "--cached", "--quiet"],
                  capture_output=True,
              )
              if staged.returncode == 0:
                  print("No staged changes — nothing to commit")
                  sys.exit(0)

              subprocess.run(
                  ["git", "-C", str(target), "commit", "-m", f"fix: {summary}"],
                  check=True,
              )
              subprocess.run(
                  ["git", "-C", str(target), "remote", "set-url", "origin",
                   f"https://x-access-token:{pat}@github.com/pon00050/{repo}"],
                  check=True,
              )
              subprocess.run(
                  ["git", "-C", str(target), "push", "origin", branch],
                  check=True,
              )
          except subprocess.CalledProcessError as e:
              print(f"Git/push failed: {e}")
              print("ECOSYSTEM_PAT may not be configured — cannot push to sibling repo.")
              sys.exit(0)

          # Create PR
          changed_list = "\n".join(f"- `{f}`" for f in changed)
          test_out = result.get("test_output", "")[-600:]
          run_url = (
              f"{os.environ.get('GITHUB_SERVER_URL','https://github.com')}/"
              f"{os.environ.get('GITHUB_REPOSITORY','')}/"
              f"actions/runs/{os.environ.get('GITHUB_RUN_ID','0')}"
          )
          pr_body = (
              "## Auto-fix by Tier 4 Agent\n\n"
              + summary + "\n\n"
              + "**Changed files:**\n" + changed_list + "\n\n"
              + "**Test output (passing):**\n```\n" + test_out + "\n```\n\n"
              + "---\n"
              + f"🤖 Auto-generated by [Tier 4 — Agent Fix Worker]({run_url})\n"
          )
          pr = subprocess.run([
              "gh", "pr", "create",
              "--repo", f"pon00050/{repo}",
              "--title", f"fix({repo}): {summary[:72]}",
              "--body", pr_body,
              "--base", "master",
              "--head", branch,
          ], capture_output=True, text=True)
          pr_url = pr.stdout.strip() or pr.stderr.strip()
          print(f"PR: {pr_url}")

          brief_path = workspace / "_scratchpad" / "fix-brief.json"
          brief = json.loads(brief_path.read_text()) if brief_path.exists() else {}
          category = brief.get("category", "")

          # Write pr-result for Telegram and follow-up steps
          (workspace / "_scratchpad" / "pr-result.json").write_text(
              json.dumps({
                  "status": "fixed", "repo": repo, "summary": summary,
                  "category": category, "changed_files": changed, "pr_url": pr_url,
              })
          )

          # Auto-merge all categories that passed the independent verify_agent gate.
          # STUB (new tests) and TEST_FAIL (source fixes) are safe to auto-merge
          # because verify_agent already ran the full test suite independently.
          LOW_RISK = {"DOC_DRIFT", "COUNT_DRIFT", "STUB", "TEST_FAIL", "CONVENTION_DRIFT"}
          merge_succeeded = False
          if category in LOW_RISK and pr_url.startswith("https://"):
              merge = subprocess.run([
                  "gh", "pr", "merge", pr_url,
                  "--squash", "--auto",
                  "--delete-branch",          # clean up autofix/* branch after merge
                  "--repo", f"pon00050/{repo}",
              ], capture_output=True, text=True)
              if merge.returncode == 0:
                  print(f"Auto-merge enabled for {category} PR (branch will be deleted on merge)")
                  merge_succeeded = True
              else:
                  print(f"Auto-merge skipped (branch protection may not be set): {merge.stderr.strip()[:100]}")

          # Comment on originating issue; close it if the fix was auto-merged
          issue_num = brief.get("issue_number")
          if issue_num:
              if merge_succeeded:
                  # Close the issue — the fix is merged (verify_agent gate already passed)
                  subprocess.run([
                      "gh", "issue", "close", str(issue_num),
                      "--comment",
                      f"Resolved by auto-merged PR: {pr_url}\n\n"
                      f"Fix: {summary}\n"
                      f"Category: {category} | Repo: {repo}",
                  ], check=False)
              else:
                  subprocess.run([
                      "gh", "issue", "comment", str(issue_num),
                      "--body", f"Auto-fix PR created: {pr_url}",
                  ], check=False)
          PYEOF

      - name: Trigger count-sync after merge (closes test-count drift)
        # After a Tier 4 fix that adds/removes tests, dispatch count-sync immediately
        # instead of waiting for the next daily tier1-tests run (up to 24h lag).
        if: steps.parse.outputs.open_fix_prs == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from pathlib import Path

          ws = Path(os.environ["GITHUB_WORKSPACE"])
          pr_path = ws / "_scratchpad" / "pr-result.json"
          if not pr_path.exists():
              print("No pr-result — skipping count-sync dispatch")
              exit(0)

          d = json.loads(pr_path.read_text())
          # Only dispatch for categories that add/remove tests
          TEST_AFFECTING = {"TEST_FAIL", "STUB", "COUNT_DRIFT"}
          if d.get("status") == "fixed" and d.get("category", "") in TEST_AFFECTING:
              result = subprocess.run([
                  "gh", "workflow", "run", "tier1-count-sync.yml",
                  "--repo", os.environ.get("GITHUB_REPOSITORY", "pon00050/forensic-accounting-toolkit"),
              ], capture_output=True, text=True)
              if result.returncode == 0:
                  print(f"Dispatched tier1-count-sync after {d['category']} fix in {d.get('repo')}")
              else:
                  print(f"count-sync dispatch failed (non-critical): {result.stderr.strip()[:150]}")
          else:
              print(f"Category {d.get('category')} does not affect test counts — skipping dispatch")
          PYEOF

      - name: Telegram notification
        if: always() && steps.parse.outputs.open_fix_prs == '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured — skipping"
            exit 0
          fi
          python3 - <<'PYEOF'
          import json, os, urllib.parse, urllib.request
          from pathlib import Path

          token   = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          ws      = Path(os.environ["GITHUB_WORKSPACE"])
          run_url = (f"{os.environ.get('GITHUB_SERVER_URL','https://github.com')}/"
                     f"{os.environ.get('GITHUB_REPOSITORY','')}/"
                     f"actions/runs/{os.environ.get('GITHUB_RUN_ID','0')}")

          pr_path = ws / "_scratchpad" / "pr-result.json"
          if pr_path.exists():
              d = json.loads(pr_path.read_text())
          else:
              fix_path = ws / "_scratchpad" / "fix-result.json"
              d = json.loads(fix_path.read_text()) if fix_path.exists() else {}

          status  = d.get("status", "unknown")
          repo    = d.get("repo", "?")
          summary = d.get("summary", "")
          pr_url  = d.get("pr_url")

          if status == "fixed" and pr_url and pr_url.startswith("https://"):
              text = f"✅ *Autofix — {repo}*\n{summary}\n[View PR]({pr_url})"
          elif status == "needs_human":
              text = f"⚠️ *Needs you — {repo}*\n{summary}\n[Logs]({run_url})"
          else:
              text = f"ℹ️ *Tier 4 done — {repo}*\nStatus: {status}\n{summary}"

          data = urllib.parse.urlencode({
              "chat_id": chat_id, "text": text,
              "parse_mode": "Markdown", "disable_web_page_preview": "true",
          }).encode()
          try:
              with urllib.request.urlopen(
                  urllib.request.Request(
                      f"https://api.telegram.org/bot{token}/sendMessage", data=data
                  ), timeout=10
              ) as r:
                  print("Telegram sent:", r.status)
          except Exception as e:
              print(f"Telegram failed (non-critical): {e}")
          PYEOF

      - name: Create follow-up tasks (Haiku)
        if: always() && steps.parse.outputs.open_fix_prs == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'PYEOF'
          import asyncio, json, os, subprocess, sys
          from pathlib import Path
          sys.path.insert(0, "scripts/agents")
          from _sdk_helpers import load_context, run_agent, collect_text

          ws = Path(os.environ["GITHUB_WORKSPACE"])
          pr_path = ws / "_scratchpad" / "pr-result.json"
          if not pr_path.exists():
              print("No pr-result.json — skipping follow-up tasks")
              sys.exit(0)

          d = json.loads(pr_path.read_text())
          if d.get("status") != "fixed":
              print(f"Status={d.get('status')} — no follow-up tasks")
              sys.exit(0)

          repo     = d.get("repo", "")
          summary  = d.get("summary", "")
          category = d.get("category", "")
          pr_url   = d.get("pr_url", "")
          changed  = d.get("changed_files", [])

          PROMPT = f"""
          A Tier 4 autofix just succeeded. Create 1-2 follow-up GitHub issues
          for work that should happen next as a direct consequence.

          Fix summary:
          - Repo: {repo}
          - Category: {category}
          - What was fixed: {summary}
          - PR: {pr_url}
          - Files changed: {json.dumps(changed)}

          Rules:
          - Exactly 1-2 issues. No more.
          - Be specific — include repo name and what to check.
          - Use label `agent-task` for AI-actionable, `needs-human` for human-only.
          - Category patterns: DOC_DRIFT → scan other repos for same stale name;
            COUNT_DRIFT → verify README counts match; TEST_FAIL → add regression test;
            CONVENTION_DRIFT → check sibling repos for same gap; STUB → verify impl.

          For each issue run (Bash tool):
          gh issue create --repo pon00050/forensic-accounting-toolkit \\
            --title "..." --body "..." --label "agent-task"

          Then output JSON: {{"follow_up_issues": [{{"title": "...", "url": "..."}}]}}
          """

          async def main():
              from claude_agent_sdk import ClaudeAgentOptions
              options = ClaudeAgentOptions(
                  system_prompt=load_context() + "\nYou create follow-up GitHub issues. Be concise.",
                  allowed_tools=["Bash"],
                  permission_mode="bypassPermissions",
                  max_turns=8,
                  max_budget_usd=0.10,
                  model="claude-haiku-4-5-20251001",
                  cwd=os.environ.get("GITHUB_WORKSPACE", "."),
              )
              msgs = await run_agent(PROMPT, options,
                  escalation_context=f"Follow-up task creation failed for {repo}")
              print("[follow-up]", collect_text(msgs)[-300:])

          asyncio.run(main())
          PYEOF

      - name: Upload scratchpad
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-fix-${{ github.run_id }}
          path: _scratchpad/
          retention-days: 30
          if-no-files-found: ignore
