name: "Tier 1 — Doc Drift Scan"

on:
  # schedule cron removed 2026-06-17 — project shelved (see RESUMING.md). Restore to resume autonomous runs.
  push:
    paths:
      - "**/*.md"
      - "**/*.toml"
      - "**/*.conf"
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      # Checkout all repos that contain .md/.toml/.conf files
      - name: Checkout ecosystem repos
        run: |
          REPOS=(
            kr-company-registry kr-trading-calendar kr-beneish kr-derivatives
            jfia-catalog jfia-forensic kr-enforcement-cases kr-forensic-core
            krff-shell kr-dart-pipeline kr-anomaly-scoring kr-stat-tests kr-real-estate
          )
          for repo in "${REPOS[@]}"; do
            gh repo clone "pon00050/$repo" "_deps/$repo" -- --depth=1 2>/dev/null || \
            git clone --depth=1 "https://github.com/pon00050/$repo.git" "_deps/$repo" 2>/dev/null || \
            echo "Warning: could not clone $repo"
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Symlink repos
        run: bash scripts/ci/checkout-ecosystem.sh

      - name: Run doc-drift scan
        run: bash scripts/ci/doc-drift-scan.sh

      - name: Upload scratchpad artifact
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-doc-drift
          path: _scratchpad/doc-drift.json
          retention-days: 90

      - name: Auto-fix hub doc drift
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          if python3 scripts/ci/autofix-doc-drift.py; then
            # Commit hub fixes — [skip ci] prevents push-loop (workflow triggers on *.md pushes)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
            git add -u
            if ! git diff --cached --quiet; then
              git commit -m "fix: auto-replace stale kr-forensic-finance refs in hub docs [skip ci]"
              git push origin HEAD
              echo "HUB_AUTOFIX_APPLIED=true" >> $GITHUB_ENV
              echo "Hub drift fixed and pushed."
            fi
            # Close stale hub-only drift issues (sibling-repo issues stay open)
            gh issue list --label agent-task --state open --json number,title \
              --jq '.[] | select(.title | contains("Doc drift")) | .number' \
              > /tmp/drift_issues.txt 2>/dev/null || true
            while IFS= read -r n; do
              [ -n "$n" ] && gh issue close "$n" \
                --comment "Hub doc drift auto-fixed ($(date -u +%Y-%m-%dT%H:%M:%SZ)). Sibling repo drift (if any) still requires manual attention." || true
            done < /tmp/drift_issues.txt
          else
            echo "HUB_AUTOFIX_APPLIED=false" >> $GITHUB_ENV
          fi

      - name: Fix sibling repo drift via ECOSYSTEM_PAT
        if: env.ECOSYSTEM_PAT != ''
        env:
          ECOSYSTEM_PAT: ${{ secrets.ECOSYSTEM_PAT }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          sibling_path = Path("_scratchpad/sibling-drift.json")
          if not sibling_path.exists():
              print("No sibling-drift.json — skipping sibling fix")
              sys.exit(0)

          data = json.loads(sibling_path.read_text())
          repos = data.get("repos", {})
          if not repos:
              print("No sibling repos with drift")
              sys.exit(0)

          parent = Path(os.environ["GITHUB_WORKSPACE"]).parent
          pat = os.environ["ECOSYSTEM_PAT"]
          fixed_repos = []

          for repo, files in repos.items():
              repo_path = parent / repo
              if not repo_path.exists():
                  print(f"  SKIP {repo}: not cloned at {repo_path}")
                  continue

              changed = False
              for filepath_str in files:
                  p = Path(filepath_str)
                  if not p.exists():
                      print(f"    SKIP (not found): {filepath_str}")
                      continue
                  text = p.read_text(encoding="utf-8", errors="replace")
                  new_text = text.replace("kr-forensic-finance", "forensic-accounting-toolkit")
                  if new_text != text:
                      p.write_text(new_text, encoding="utf-8")
                      changed = True
                      print(f"  Fixed: {filepath_str}")

              if not changed:
                  print(f"  No changes needed in {repo}")
                  continue

              try:
                  subprocess.run(["git", "-C", str(repo_path), "config", "user.name",
                                  "github-actions[bot]"], check=True)
                  subprocess.run(["git", "-C", str(repo_path), "config", "user.email",
                                  "github-actions[bot]@users.noreply.github.com"], check=True)
                  subprocess.run(["git", "-C", str(repo_path), "remote", "set-url", "origin",
                                  f"https://x-access-token:{pat}@github.com/pon00050/{repo}"],
                                 check=True)
                  subprocess.run(["git", "-C", str(repo_path), "add", "-u"], check=True)
                  staged = subprocess.run(
                      ["git", "-C", str(repo_path), "diff", "--cached", "--quiet"],
                      capture_output=True,
                  )
                  if staged.returncode != 0:
                      subprocess.run(
                          ["git", "-C", str(repo_path), "commit", "-m",
                           "fix: replace stale kr-forensic-finance refs [skip ci]"],
                          check=True,
                      )
                      subprocess.run(
                          ["git", "-C", str(repo_path), "push", "origin", "HEAD"],
                          check=True,
                      )
                      fixed_repos.append(repo)
                      print(f"  Pushed fix for {repo}")
              except subprocess.CalledProcessError as e:
                  print(f"  ERROR pushing to {repo}: {e}")

          print(f"Sibling fix: pushed to {len(fixed_repos)} repo(s): {fixed_repos}")
          if fixed_repos:
              os.environ["SIBLING_AUTOFIX_APPLIED"] = "true"
          PYEOF
          # Export env var for subsequent steps
          if python3 -c "
          import json
          from pathlib import Path
          d = json.loads(Path('_scratchpad/sibling-drift.json').read_text())
          " 2>/dev/null; then
            echo "SIBLING_DRIFT_CHECKED=true" >> $GITHUB_ENV
          fi

      - name: Create or update issue if drift remains
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          workspace = Path(os.environ.get("GITHUB_WORKSPACE", ".")).resolve()
          data = json.loads(Path("_scratchpad/doc-drift.json").read_text())
          count = data.get("stale_ref_count", 0)
          if count == 0:
              print("No doc drift — no issue needed")
              sys.exit(0)

          findings = data.get("findings", [])

          # Separate hub vs sibling findings to tailor the issue body
          hub_findings = []
          sibling_findings = []
          for f in findings:
              try:
                  Path(f["file"]).resolve().relative_to(workspace)
                  hub_findings.append(f)
              except ValueError:
                  sibling_findings.append(f)

          hub_fixed = os.environ.get("HUB_AUTOFIX_APPLIED") == "true"
          remaining = sibling_findings if hub_fixed else findings
          if not remaining:
              print("All drift was in hub and has been auto-fixed — no issue needed")
              sys.exit(0)

          files_list = "\n".join(
              f"- `{f['repo']}/{f['file']}` line {f['line']}: {f['text'][:80]}"
              for f in remaining[:20]
          )
          if len(remaining) > 20:
              files_list += f"\n... and {len(remaining) - 20} more"

          hub_note = f"Hub files ({len(hub_findings)} finding(s)) were auto-fixed.\n\n" if hub_fixed and hub_findings else ""
          body = f"""## Stale Repo Name References Found

          {hub_note}**Remaining:** {len(remaining)} occurrence(s) of `kr-forensic-finance` in sibling repos
          **Date:** {data['generated_at']}

          ### Files requiring manual fix
          {files_list}

          ### Fix
          Replace `kr-forensic-finance` with the correct current repo name in the files above.
          Sibling repos require per-repo commits — auto-fix cannot apply without a PAT.
          """
          result = subprocess.run([
              "gh", "issue", "create",
              "--title", f"[agent] Doc drift: {len(remaining)} stale kr-forensic-finance references",
              "--body", body,
              "--label", "agent-task",
          ], capture_output=True, text=True)
          if result.returncode == 0:
              print("Issue created:", result.stdout.strip())
          else:
              print("Issue creation skipped:", result.stderr.strip())
          PYEOF
