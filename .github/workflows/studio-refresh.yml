name: "Studio — Data Refresh (internal-only)"

# Self-running data-refresh loop. Gated by FLEET_ENABLED via the fail-closed heartbeat.
# smoke (no secrets) = plumbing + liveness only. full (needs DART_API_KEY) = DART ETL via
# studio/loops/refresh.sh — NOTE: the full ETL body is still scaffolding (Phase 2); see
# studio/README.md. Transient-prone steps are continue-on-error so a blip never emails.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke = plumbing/liveness (no secrets); full = DART ETL (needs DART_API_KEY; Phase-2 scaffold)"
        type: choice
        options:
          - smoke
          - full
        default: smoke
  schedule:
    - cron: "0 21 * * 0"   # weekly Sun 21:00 UTC; gated by FLEET_ENABLED

permissions:
  contents: write

concurrency:
  group: studio-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Heartbeat gate
        id: hb
        uses: ./.github/actions/studio-heartbeat
        with:
          fleet_enabled: ${{ vars.FLEET_ENABLED }}

      - name: Skipped (fail-closed)
        if: ${{ steps.hb.outputs.proceed != 'true' }}
        run: echo "Studio refresh skipped — ${{ steps.hb.outputs.reason }}"

      - name: Set up Python
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        continue-on-error: true
        run: pip install --quiet pyyaml

      - name: Smoke — plumbing check (no secrets)
        if: ${{ steps.hb.outputs.proceed == 'true' && github.event.inputs.mode != 'full' }}
        continue-on-error: true
        run: |
          mkdir -p studio/reports
          stamp="studio/reports/refresh-$(date -u +%Y-%m-%d).md"
          {
            echo "# Studio data-refresh (smoke) — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "Heartbeat passed; runner ready; provenance + commit path exercised."
            echo "No ETL executed (smoke). Full DART refresh (mode=full) needs DART_API_KEY"
            echo "and the Phase-2 ETL body in studio/loops/refresh.sh."
          } > "$stamp"
          python studio/provenance.py stamp "$stamp" --loop studio-refresh --model none-deterministic
          echo "| $(date -u +%Y-%m-%dT%H:%M:%SZ) | studio-refresh | smoke | ok | plumbing verified |" >> studio/run-log.md

      - name: Full — DART refresh (needs DART_API_KEY; Phase-2 scaffold)
        if: ${{ steps.hb.outputs.proceed == 'true' && github.event.inputs.mode == 'full' }}
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: bash studio/loops/refresh.sh

      - name: Liveness check-in (keeps fleet alive + repo active)
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        continue-on-error: true
        run: date -u +%Y-%m-%d > studio/state/LAST_CHECKIN

      - name: Domain guardrail (data/raw immutable — real gate)
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        run: |
          git add studio
          mapfile -t changed < <(git diff --cached --name-only)
          if [ ${#changed[@]} -gt 0 ]; then
            python studio/guardrails/check_domain_rules.py --paths "${changed[@]}"
          else
            echo "no staged changes"
          fi

      - name: Commit + push
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        continue-on-error: true
        run: |
          git config user.name "studio-bot[bot]"
          git config user.email "studio-bot@users.noreply.github.com"
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "studio: data refresh $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" 2>/dev/null || true
            git push
          fi
