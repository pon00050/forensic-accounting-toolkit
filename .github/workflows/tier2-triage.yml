name: "Tier 2 — Triage Agent (Haiku)"

on:
  schedule:
    - cron: "0 0 * * *"   # 09:00 KST daily
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Checkout all ecosystem repos
        run: |
          REPOS=(
            kr-company-registry kr-trading-calendar kr-beneish kr-derivatives
            jfia-catalog jfia-forensic kr-enforcement-cases kr-forensic-core
            krff-shell kr-dart-pipeline kr-anomaly-scoring kr-stat-tests kr-real-estate
          )
          for repo in "${REPOS[@]}"; do
            git clone --depth=1 "https://github.com/pon00050/$repo.git" "_deps/$repo" 2>/dev/null || \
            echo "Warning: could not clone $repo"
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Symlink repos
        run: bash scripts/ci/checkout-ecosystem.sh

      - name: Run triage-scan.sh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _scratchpad
          # Run full triage scan, capture output
          # Adapt paths: replace Windows paths with Linux CI paths
          PARENT="$(dirname "$GITHUB_WORKSPACE")"
          # The triage-scan.sh uses ecosystem.conf which uses BASE from script location.
          # On CI, hub is GITHUB_WORKSPACE; BASE is parent.
          bash triage-scan.sh full 2>&1 | tee _scratchpad/triage-scan-raw.txt || true
          echo "Triage scan complete: $(wc -l < _scratchpad/triage-scan-raw.txt) lines"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install claude-agent-sdk
        run: pip install claude-agent-sdk

      - name: Run triage synthesis agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python scripts/agents/triage_agent.py

      - name: Upload scratchpad artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-triage
          path: |
            _scratchpad/triage.json
            _scratchpad/triage-scan-raw.txt
          retention-days: 90

      - name: Post daily triage issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess
          from pathlib import Path
          from datetime import datetime, timezone

          triage_path = Path("_scratchpad/triage.json")
          if not triage_path.exists():
              print("No triage.json — skipping issue")
              exit(0)

          data = json.loads(triage_path.read_text())
          actions = data.get("ranked_actions", [])
          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          action_list = "\n".join(
              f"{i+1}. [{a.get('priority','?')}] `{a.get('repo','?')}`: {a.get('description','')}"
              + (" ⚠️ needs-human" if not a.get('ai_actionable', True) else "")
              for i, a in enumerate(actions[:8])
          ) or "No actions surfaced."

          blocked = data.get("blocked_items", [])
          blocked_list = "\n".join(f"- {b['item']}: {b['reason']}" for b in blocked) or "None"

          summary = data.get("summary", {})
          recommended = data.get("recommended_next", "Review triage output manually")

          body = f"""## Daily Triage — {today}

          ### Summary
          - Clean repos: {summary.get('clean_repos', '?')}/{summary.get('total_repos', 13)}
          - Board AI Todo: {summary.get('board_todo_ai', '?')}
          - Convention drift: {summary.get('convention_drift_count', '?')}

          ### Ranked Actions
          {action_list}

          ### Blocked (needs human)
          {blocked_list}

          ### Recommended Next
          `{recommended}`

          ---
          > **Freshness:** Generated {today}. If reading on a later date, re-run the tier2-triage workflow or run `/triage` locally for current data.

          *Generated by tier2-triage workflow*
          """

          # Close previous daily triage issues to avoid clutter
          result = subprocess.run([
              "gh", "issue", "list",
              "--label", "agent:triage",
              "--state", "open",
              "--json", "number",
          ], capture_output=True, text=True)
          if result.returncode == 0:
              try:
                  prev_issues = json.loads(result.stdout)
                  for issue in prev_issues:
                      subprocess.run(["gh", "issue", "close", str(issue["number"])],
                                     capture_output=True)
              except Exception:
                  pass

          result = subprocess.run([
              "gh", "issue", "create",
              "--title", f"[triage] Daily ecosystem health — {today}",
              "--body", body,
              "--label", "agent:triage",
          ], capture_output=True, text=True)
          issue_url = result.stdout.strip() or result.stderr.strip()
          print("Issue:", issue_url)

          # Write issue URL for Telegram step
          from pathlib import Path as P
          P("_scratchpad/triage_issue_url.txt").write_text(issue_url)
          PYEOF

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured — skipping"
            exit 0
          fi
          python3 - <<'PYEOF'
          import json, os, urllib.parse, urllib.request
          from pathlib import Path
          from datetime import datetime, timezone

          token    = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id  = os.environ["TELEGRAM_CHAT_ID"]
          today    = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          triage_path = Path("_scratchpad/triage.json")
          issue_url   = Path("_scratchpad/triage_issue_url.txt")
          url_str     = issue_url.read_text().strip() if issue_url.exists() else ""

          if not triage_path.exists():
              text = "Triage ran but produced no output."
          else:
              data    = json.loads(triage_path.read_text())
              actions = data.get("ranked_actions", [])
              summary = data.get("summary", {})

              top3  = actions[:3]
              items = []
              for a in top3:
                  flag = " (human)" if not a.get("ai_actionable", True) else ""
                  items.append(
                      f"[{a.get('priority','?')}] {a.get('repo','?')}: "
                      f"{a.get('description','')[:70]}{flag}"
                  )
              items_text = "\n".join(items) or "No actions."

              clean = summary.get("clean_repos", "?")
              total = summary.get("total_repos", 13)
              emoji = "✅" if str(clean) == str(total) else "⚠️"

              text = (
                  f"{emoji} *Triage — {today}*\n"
                  f"Clean: {clean}/{total} repos\n\n"
                  f"*Top actions:*\n{items_text}"
              )
              if url_str.startswith("https://"):
                  text += f"\n\n[Full report]({url_str})"

          data_enc = urllib.parse.urlencode({
              "chat_id": chat_id, "text": text,
              "parse_mode": "Markdown",
              "disable_web_page_preview": "true",
          }).encode()
          try:
              with urllib.request.urlopen(
                  urllib.request.Request(
                      f"https://api.telegram.org/bot{token}/sendMessage",
                      data=data_enc,
                  ), timeout=10
              ) as r:
                  print("Telegram sent:", r.status)
          except Exception as e:
              print(f"Telegram failed (non-critical): {e}")
          PYEOF
