name: "Studio — Maintenance Crew (internal-only)"

# Self-running refinement loop. Gated by FLEET_ENABLED via the fail-closed heartbeat.
# DETERMINISTIC work today (no secrets, no LLM): discovery + doc-count reconciliation.
# LLM fix→verify→auto-merge is Phase 3 (mode=full, needs ANTHROPIC_API_KEY) and NOT yet built.
# Transient-prone steps are continue-on-error so a network/PyPI blip never emails a failure.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke = deterministic (discovery + doc-count-sync, no secrets); full = also LLM crew (Phase 3, needs ANTHROPIC_API_KEY)"
        type: choice
        options:
          - smoke
          - full
        default: smoke
  schedule:
    - cron: "0 22 * * 3"   # weekly Wed 22:00 UTC; gated by FLEET_ENABLED

permissions:
  contents: write
  issues: write

concurrency:
  group: studio-maintain
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Heartbeat gate
        id: hb
        uses: ./.github/actions/studio-heartbeat
        with:
          fleet_enabled: ${{ vars.FLEET_ENABLED }}

      - name: Skipped (fail-closed)
        if: ${{ steps.hb.outputs.proceed != 'true' }}
        run: echo "Studio maintenance skipped — ${{ steps.hb.outputs.reason }}"

      - name: Set up Python
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        continue-on-error: true
        run: pip install --quiet pyyaml

      - name: Discovery (deterministic — the work queue)
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        continue-on-error: true
        run: |
          mkdir -p studio/reports
          out="studio/reports/maintenance-$(date -u +%Y-%m-%d).md"
          python studio/maintenance/discover.py --backlog studio/maintenance/backlog.yml --config studio/fleet.config.yml --out "$out"
          python studio/provenance.py stamp "$out" --loop studio-maintain --model none-deterministic --inputs studio/maintenance/backlog.yml

      - name: Doc-count reconciliation (deterministic REAL fix)
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        continue-on-error: true
        run: |
          python studio/maintenance/sync_doc_counts.py | tee /tmp/sync.out
          echo "| $(date -u +%Y-%m-%dT%H:%M:%SZ) | studio-maintain | doc-count-sync | ok | $(tail -1 /tmp/sync.out) |" >> studio/run-log.md

      - name: Execute LLM crew (fix → verify → auto-merge) — Phase 3, needs ANTHROPIC_API_KEY
        if: ${{ steps.hb.outputs.proceed == 'true' && github.event.inputs.mode == 'full' }}
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "NOT YET IMPLEMENTED (Phase 3): would route ONE SAFE backlog item through"
          echo "scripts/agents/fix_agent.py -> verify_agent.py -> auto-merge on green CI."
          echo "Until built, this step is a no-op even with the secret set."

      - name: Liveness check-in (keeps fleet alive + repo active)
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        continue-on-error: true
        run: date -u +%Y-%m-%d > studio/state/LAST_CHECKIN

      - name: Domain guardrail (data/raw immutable — real gate)
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        run: |
          git add studio ECOSYSTEM.md
          mapfile -t changed < <(git diff --cached --name-only)
          if [ ${#changed[@]} -gt 0 ]; then
            python studio/guardrails/check_domain_rules.py --paths "${changed[@]}"
          else
            echo "no staged changes"
          fi

      - name: Commit + push
        if: ${{ steps.hb.outputs.proceed == 'true' }}
        continue-on-error: true
        run: |
          git config user.name "studio-bot[bot]"
          git config user.email "studio-bot@users.noreply.github.com"
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "studio: maintenance $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" 2>/dev/null || true
            git push
          fi
