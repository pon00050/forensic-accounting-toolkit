# Forensic Studio — fleet configuration (the "cage")
# Single source of truth for the autonomous, INTERNAL-ONLY refresh + refinement fleet.
# Every loop reads this and the FLEET_ENABLED master switch before acting.
# See AGENT_TEAM_REDESIGN.md, RESUMING.md, and the approved plan.

version: 1

# Posture (owner decision 2026-06-17): keep outputs fresh + committed as reproducible
# artifacts; NEVER auto-publish entity-level forensic conclusions. Outputs are
# "probability, not a verdict" (the project's own hard rule).
posture: internal-only

# Master switch — a GitHub repo VARIABLE. Loops fail-closed (green no-op skip) unless "true".
master_switch_variable: FLEET_ENABLED

# Dead-man's switch: loops fail closed if no human check-in within this window.
# Long by design (owner is away); this is a final safety, not a daily gate.
deadman_checkin_max_days: 120
checkin_file: studio/state/LAST_CHECKIN

# Budget governor. Hard caps live (a) per-run in the Agent SDK calls and (b) as the
# Anthropic *workspace* monthly ceiling the owner sets in the console. Expected spend
# is far below the ceiling (see plan section 1c): deterministic loops cost $0.
budget:
  workspace_monthly_ceiling_usd: 25      # backstop only; ~never hit
  per_run_caps_usd:
    classify_haiku: 0.50
    execute_sonnet: 2.00
    verify_sonnet: 0.50
    critic_opus: 1.00

# Model routing — cheapest model that can do the job.
models:
  classify: claude-haiku-4-5-20251001
  execute:  claude-sonnet-4-6
  verify:   claude-sonnet-4-6
  critic:   claude-opus-4-8

# Schedules (UTC). Registered but gated by FLEET_ENABLED — harmless green no-op skips
# until the owner flips the switch.
schedules:
  studio-refresh:  "0 21 * * 0"     # weekly Sun 21:00 UTC (Mon 06:00 KST)
  studio-maintain: "0 22 * * 3"     # weekly Wed 22:00 UTC

# Maintenance auto-merge whitelist (deterministic / test-verifiable only).
# Everything else = propose-only PR (async human review, never blocks the fleet).
auto_merge_classes:
  - doc-count-sync
  - docstrings
  - type-hints
  - lint-fix
  - test-addition
