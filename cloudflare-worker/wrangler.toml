name = "forensic-toolkit-bot"
main = "bot.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
preview_urls = false

# Non-secret config
[vars]
GITHUB_REPO = "pon00050/forensic-accounting-toolkit"

# KV namespace for conversation history
[[kv_namespaces]]
binding = "CHAT_STORE"
id = "401118b543d94bc293978d189c0fca80"

# Secrets — set these via CLI (never commit):
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put GITHUB_TOKEN        (use your ECOSYSTEM_PAT value)
#   wrangler secret put ANTHROPIC_API_KEY   (for team leader agent)
