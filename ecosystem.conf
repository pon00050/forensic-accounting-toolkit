#!/usr/bin/env bash
# ecosystem.conf — Single source of truth for ecosystem paths and repo list.
# Sourced by ecosystem.sh, triage-scan.sh, and hooks.
# When a repo is added or removed, update this file only.

# ─── Paths ───────────────────────────────────────────────────────────
# Resolve BASE dynamically from this file's location (hub is under BASE)
SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
BASE="$(cd "$SCRIPT_DIR/.." && pwd)"
HUB="$SCRIPT_DIR"

# GH CLI: discover dynamically, fall back to common install paths
if command -v gh &>/dev/null; then
    GH="gh"
elif [ -f "/c/Program Files/GitHub CLI/gh.exe" ]; then
    GH="/c/Program Files/GitHub CLI/gh.exe"
elif [ -f "$HOME/scoop/shims/gh.exe" ]; then
    GH="$HOME/scoop/shims/gh.exe"
else
    GH=""  # empty = unavailable, scripts should handle gracefully
fi

# ─── Repo registry ──────────────────────────────────────────────────
# All ecosystem repos (hub first, then in dependency order)
ALL_REPOS=(
    forensic-accounting-toolkit
    kr-company-registry
    kr-trading-calendar
    kr-beneish
    kr-derivatives
    jfia-catalog
    jfia-forensic
    kr-forensic-finance
    kr-real-estate
)

# Repos with test suites (subset of ALL_REPOS, excludes hub and data-only repos)
REPOS_WITH_TESTS=(
    kr-company-registry
    kr-trading-calendar
    kr-beneish
    kr-derivatives
    jfia-forensic
    kr-forensic-finance
)

# ─── Data pipeline paths ─────────────────────────────────────────────
# Source and destination for parquet sync between repos
PIPELINE_SRC="$BASE/kr-forensic-finance/01_Data/processed"
PIPELINE_DST="$BASE/kr-derivatives/data/input"

# Parquet files that flow from kr-forensic-finance → kr-derivatives
PARQUET_FILES=(
    price_volume.parquet
    cb_bw_events.parquet
    corp_actions.parquet
)

# ─── Test commands ───────────────────────────────────────────────────
# Returns the test runner prefix for a given repo
_test_runner() {
    local repo="$1"
    case "$repo" in
        kr-forensic-finance) echo "python -m pytest" ;;
        jfia-catalog)        echo "" ;;
        *)                   echo "uv run pytest" ;;
    esac
}

# Returns the full test command for a given repo
test_cmd() {
    local runner
    runner=$(_test_runner "$1")
    if [ -z "$runner" ]; then
        echo "echo 'no tests (data artifact)'"
    else
        echo "$runner tests/ -v"
    fi
}

# Returns the test collection command for a given repo (for counting)
test_collect_cmd() {
    local runner
    runner=$(_test_runner "$1")
    [ -z "$runner" ] && return
    echo "$runner tests/ --co -q"
}

# ─── CLAUDE.md test count parser ─────────────────────────────────────
# Parses claimed test counts from hub CLAUDE.md ecosystem table.
# Returns associative array entries like: repo_name count
# Usage: eval "$(parse_claude_test_counts)"
#        then access: ${CLAUDE_COUNTS[kr-beneish]}
parse_claude_test_counts() {
    local claude_md="$HUB/CLAUDE.md"
    [ -f "$claude_md" ] || return

    # Parse lines like: | **kr-beneish** | `../kr-beneish` | description | 61 |
    # Extract repo name and last numeric column (test count)
    python -c "
import re, sys

counts = {}
with open(sys.argv[1]) as f:
    for line in f:
        # Match ecosystem table rows: | **name** | path | description | N |
        m = re.match(r'\|\s*\*\*([^*]+)\*\*\s*\|.*\|\s*(\d+)\s*\|', line)
        if m:
            repo = m.group(1)
            count = m.group(2)
            counts[repo] = count

# Output as bash associative array assignments
for repo, count in counts.items():
    print(f'CLAUDE_COUNTS[{repo}]={count}')
" "$claude_md" 2>/dev/null
}

# ─── Extractor count ─────────────────────────────────────────────────
# Counts extractors dynamically from kr-forensic-finance
count_extractors() {
    local dir="$BASE/kr-forensic-finance/02_Pipeline"
    if [ -d "$dir" ]; then
        local files=("$dir"/extract_*.py)
        if [ -e "${files[0]}" ]; then
            echo "${#files[@]}"
        else
            echo "0"
        fi
    else
        echo "0"
    fi
}
