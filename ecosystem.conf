# ─── Test commands ───────────────────────────────────────────────────
# Returns the test runner prefix for a given repo
_test_runner() {
    local repo="$1"
    case "$repo" in
        kr-forensic-finance) echo "uv run pytest" ;;  # was python -m pytest; now uv
        jfia-catalog)        echo "" ;;
        *)                   echo "uv run pytest" ;;
    esac
}

# Returns the full test command for a given repo
test_cmd() {
    local runner
    runner=$(_test_runner "$1")
    if [ -z "$runner" ]; then
        echo "echo 'no tests (data artifact)'"
    else
        echo "$runner tests/ -v"
    fi
}

# Returns the test collection command for a given repo (for counting)
test_collect_cmd() {
    local runner
    runner=$(_test_runner "$1")
    [ -z "$runner" ] && return
    echo "$runner tests/ --co -q"
}

# ─── CLAUDE.md test count parser ─────────────────────────────────────
# Parses claimed test counts from hub CLAUDE.md ecosystem table.
# Returns associative array entries like: repo_name count
# Usage: eval "$(parse_claude_test_counts)"
#        then access: ${CLAUDE_COUNTS[kr-beneish]}
parse_claude_test_counts() {
    local claude_md="$HUB/CLAUDE.md"
    [ -f "$claude_md" ] || return

    # Parse lines like: | **kr-beneish** | `../kr-beneish` | description | 61 |
    # Extract repo name and last numeric column (test count)
    python -c "
import re, sys

counts = {}
with open(sys.argv[1]) as f:
    for line in f:
        # Match ecosystem table rows: | **name** | path | description | N |
        m = re.match(r'\|\s*\*\*([^*]+)\*\*\s*\|.*\|\s*(\d+)\s*\|', line)
        if m:
            repo = m.group(1)
            count = m.group(2)
            counts[repo] = count

# Output as bash associative array assignments
for repo, count in counts.items():
    print(f'CLAUDE_COUNTS[{repo}]={count}')
" "$claude_md" 2>/dev/null
}

# ─── Known Gaps parser ─────────────────────────────────────────────
# Parses ## Known Gaps tables from each repo's CLAUDE.md.
# Outputs tab-separated lines: repo\tstatus\tdescription
# Usage: parse_known_gaps
parse_known_gaps() {
    PYTHONIOENCODING=utf-8 python -c "
import re, sys, os

base = sys.argv[1]
repos = sys.argv[2:]

for repo in repos:
    claude_md = os.path.join(base, repo, 'CLAUDE.md')
    if not os.path.isfile(claude_md):
        continue

    in_gaps = False
    with open(claude_md, encoding='utf-8', errors='replace') as f:
        for line in f:
            stripped = line.strip()
            # Detect ## Known Gaps heading
            if re.match(r'^##\s+Known Gaps', stripped):
                in_gaps = True
                continue
            # Stop at next heading
            if in_gaps and re.match(r'^##\s+', stripped):
                break
            if not in_gaps:
                continue
            # Skip header/separator rows and empty lines
            if not stripped.startswith('|'):
                continue
            if re.match(r'^\|[\s\-:|]+\|$', stripped):
                continue
            # Header row detection: skip if first cell contains 'Gap' or 'Known Gap'
            cells = [c.strip() for c in stripped.split('|')]
            # Remove empty first/last from leading/trailing |
            cells = [c for c in cells if c]
            if len(cells) < 2:
                continue
            if cells[0].lower() in ('gap', 'known gap'):
                continue
            # cells[0] = gap description, cells[1] = why/reason, cells[2] = status (if exists)
            gap_desc = cells[0]
            status = cells[-1] if len(cells) >= 3 else 'Unknown'
            print(f'{repo}\t{status}\t{gap_desc}')
" "$BASE" "${ALL_REPOS[@]}" 2>/dev/null
}

