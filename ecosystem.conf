    forensic-accounting-toolkit
    kr-company-registry
    kr-trading-calendar
    kr-beneish
    kr-derivatives
    jfia-catalog
    jfia-forensic
    kr-enforcement-cases
    kr-forensic-core
    kr-forensic-finance    # local dir; GitHub/package name is krff-shell
    kr-dart-pipeline
    kr-anomaly-scoring
    kr-stat-tests
    kr-real-estate
)

# Repos with test suites (subset of ALL_REPOS, excludes hub and data-only repos)
